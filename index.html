<!-- ==================== MFG 인증 시스템 (자기완결) ==================== -->
<script>
(function() {
  const AUTH_URL = 'https://script.google.com/macros/s/AKfycbyhM1MJAEflRpDIKa0vWKQdcY4h1WVkI8KZqGuKjgOQDCt7iRwcsexXSmhtSdTwwepH/exec';
  const PORTAL_URL = 'https://eatonmfgkorea-maker.github.io/MFGManagement/';
  
  function isAuthed() {
    const token = localStorage.getItem('mfg_auth_token');
    const expiry = parseInt(localStorage.getItem('mfg_auth_expiry') || '0');
    return token && Date.now() < expiry;
  }
  
  if (isAuthed()) return;
  
  function injectModal() {
    const div = document.createElement('div');
    div.id = 'mfgAuthOverlay';
    div.style.cssText = 'position:fixed;inset:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Pretendard,"Malgun Gothic",-apple-system,sans-serif;padding:1rem;';
    div.innerHTML = `
      <div style="background:#0f172a;border:1px solid rgba(255,255,255,0.1);border-radius:1rem;padding:2rem;width:100%;max-width:28rem;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <div style="display:inline-flex;align-items:center;justify-content:center;width:4rem;height:4rem;border-radius:1rem;background:rgba(59,130,246,0.2);border:1px solid rgba(96,165,250,0.3);margin-bottom:1rem;">
            <svg style="width:2rem;height:2rem;color:#60a5fa;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
          </div>
          <h2 style="font-size:1.5rem;font-weight:bold;color:#fff;margin:0;">로그인이 필요합니다</h2>
          <p style="font-size:0.875rem;color:#94a3b8;margin-top:0.5rem;margin-bottom:0;">이 앱을 사용하려면 로그인해주세요</p>
        </div>
        <label style="display:block;font-size:0.875rem;color:#cbd5e1;margin-bottom:0.375rem;">ID</label>
        <input id="mfgAuthUserId" type="text" autocomplete="username" placeholder="ID" style="width:100%;padding:0.625rem 1rem;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;color:#fff;outline:none;font-size:1rem;margin-bottom:1rem;box-sizing:border-box;" />
        <label style="display:block;font-size:0.875rem;color:#cbd5e1;margin-bottom:0.375rem;">비밀번호</label>
        <input id="mfgAuthPassword" type="password" autocomplete="current-password" placeholder="••••••••" style="width:100%;padding:0.625rem 1rem;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;color:#fff;outline:none;font-size:1rem;margin-bottom:1rem;box-sizing:border-box;" />
        <div id="mfgAuthError" style="display:none;font-size:0.875rem;color:#f87171;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:0.5rem;padding:0.5rem 0.75rem;margin-bottom:1rem;"></div>
        <button id="mfgAuthBtn" style="width:100%;padding:0.625rem;background:#2563eb;color:#fff;font-weight:600;border:none;border-radius:0.5rem;cursor:pointer;font-size:1rem;">로그인</button>
        <div style="margin-top:1rem;text-align:center;">
          <a href="${PORTAL_URL}" style="font-size:0.875rem;color:#94a3b8;text-decoration:none;">← 메인 포털로 돌아가기</a>
        </div>
      </div>
    `;
    document.body.appendChild(div);
    document.body.style.overflow = 'hidden';
    
    const userIdEl = document.getElementById('mfgAuthUserId');
    const pwdEl = document.getElementById('mfgAuthPassword');
    const btnEl = document.getElementById('mfgAuthBtn');
    const errEl = document.getElementById('mfgAuthError');
    
    setTimeout(() => userIdEl.focus(), 100);
    
    async function doLogin() {
      const userId = userIdEl.value.trim();
      const password = pwdEl.value;
      if (!userId || !password) {
        errEl.textContent = 'ID와 비밀번호를 입력해주세요.';
        errEl.style.display = 'block';
        return;
      }
      btnEl.disabled = true;
      btnEl.textContent = '로그인 중...';
      errEl.style.display = 'none';
      try {
        const res = await fetch(AUTH_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', userId, password })
        });
        const data = await res.json();
        if (!data.ok) {
          errEl.textContent = data.error || '로그인 실패';
          errEl.style.display = 'block';
          btnEl.disabled = false;
          btnEl.textContent = '로그인';
          return;
        }
        localStorage.setItem('mfg_auth_token', data.token);
        localStorage.setItem('mfg_auth_user', data.userId);
        localStorage.setItem('mfg_auth_expiry', String(data.expiresAt));
        document.getElementById('mfgAuthOverlay').remove();
        document.body.style.overflow = '';
      } catch (e) {
        errEl.textContent = '네트워크 오류: ' + e.message;
        errEl.style.display = 'block';
        btnEl.disabled = false;
        btnEl.textContent = '로그인';
      }
    }
    
    btnEl.addEventListener('click', doLogin);
    pwdEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
    userIdEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') pwdEl.focus(); });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectModal);
  } else {
    injectModal();
  }
})();
</script>

let syncStatus = { last:"", error:"", syncing:false };

async function syncToGoogle(type) {
  if (!GOOGLE_SYNC_URL) return;
  syncStatus.syncing = true; updateSyncBadge();
  try {
    const payload = { type };
    if (type==="all"||type==="settings") payload.settings = state.settings;
    if (type==="all"||type==="logs") payload.logs = state.logs;
    if (type==="all"||type==="plans") payload.plans = state.plans;
    if (type==="all"||type==="evals") payload.evals = state.evals;
    await fetch(GOOGLE_SYNC_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(payload) });
    syncStatus.last = new Date().toLocaleString("ko-KR"); syncStatus.error = "";
  } catch(err) { syncStatus.error = err.message; }
  syncStatus.syncing = false; updateSyncBadge();
}

async function syncFromGoogle() {
  if (!GOOGLE_SYNC_URL) return false;
  syncStatus.syncing = true; updateSyncBadge();
  try {
    const resp = await fetch(GOOGLE_SYNC_URL+"?type=all");
    const result = await resp.json();
    if (result.success) {
      let updated = false;
      if (result.settings && typeof result.settings === "object" && result.settings.lines) {
        state.settings = result.settings; localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); updated = true;
      }
      if (result.logs && Array.isArray(result.logs) && result.logs.length > 0) {
        state.logs = result.logs; localStorage.setItem(LOGS_KEY, JSON.stringify(state.logs)); updated = true;
      }
      if (result.plans && Array.isArray(result.plans) && result.plans.length > 0) {
        state.plans = result.plans; localStorage.setItem(PLANS_KEY, JSON.stringify(state.plans)); updated = true;
      }
      if (result.evals && Array.isArray(result.evals) && result.evals.length > 0) {
        state.evals = result.evals; localStorage.setItem(EVALS_KEY, JSON.stringify(state.evals)); updated = true;
      }
      syncStatus.last = new Date().toLocaleString("ko-KR"); syncStatus.error = "";
      syncStatus.syncing = false; updateSyncBadge(); return updated;
    }
  } catch(err) { syncStatus.error = err.message; }
  syncStatus.syncing = false; updateSyncBadge(); return false;
}

function updateSyncBadge() {
  const el = document.getElementById("syncBadge");
  if (!el) return;
  if (syncStatus.syncing) el.innerHTML = '<span class="text-blue-600">⟳ 동기화 중...</span>';
  else if (syncStatus.error) el.innerHTML = '<span class="text-red-600" title="'+syncStatus.error+'">⚠ 오류</span>';
  else if (syncStatus.last) el.innerHTML = '<span class="text-green-600">☁ '+syncStatus.last+'</span>';
  else el.innerHTML = '<span class="text-gray-400">☁</span>';
}

// ============ 자동 교육일정 생성 (입사일 기준 2주 후부터 1달 간격) ============
function generateAutoSchedule(traineeName) {
  const trainee = state.settings.trainees.find(t=>t.name===traineeName);
  if (!trainee || !trainee.joinDate || !trainee.dept) return 0;
  if (trainee.resignDate) return 0; // 퇴사자는 일정 생성 안 함
  const dept = (state.settings.departments||[]).find(d=>d.name===trainee.dept);
  if (!dept) return 0;
  const requiredIds = dept.requiredProcessIds || [];
  const existingPlanPids = new Set(state.plans.filter(p=>p.traineeName===traineeName && (p.type||"training")==="training").map(p=>p.processId));
  const donePids = new Set(state.logs.filter(l=>(l.trainees||[]).includes(traineeName)).map(l=>l.processId));

  const startDate = new Date(trainee.joinDate);
  startDate.setDate(startDate.getDate() + 14); // 2주 후

  let added = 0;
  requiredIds.forEach((pid, idx) => {
    if (existingPlanPids.has(pid) || donePids.has(pid)) return;
    const planDate = new Date(startDate);
    planDate.setMonth(planDate.getMonth() + idx); // 1달 간격
    state.plans.push({
      traineeName, processId:pid,
      plannedDate: planDate.toISOString().slice(0,10),
      status:"planned", type:"training", autoGenerated:true
    });
    added++;
  });
  if (added > 0) savePlans(state.plans);
  return added;
}

// 공정교육 완료 시 → 6개월 뒤 스킬평가 일정 자동 생성
function generateSkillEvalSchedule(traineeName, processId, trainingDate) {
  if (isResigned(traineeName)) return; // 퇴사자는 일정 생성 안 함
  // 해당 인원+공정에 planned 상태의 스킬평가 일정이 이미 있으면 중복 생성 안 함
  const exists = state.plans.some(p =>
    p.traineeName === traineeName && p.processId === processId && p.type === "skillEval" && p.status === "planned"
  );
  if (exists) return;

  const evalDate = new Date(trainingDate);
  evalDate.setMonth(evalDate.getMonth() + 6);
  state.plans.push({
    traineeName, processId,
    plannedDate: evalDate.toISOString().slice(0,10),
    status: "planned", type: "skillEval", autoGenerated: true
  });
  savePlans(state.plans);
}

// ============ 스킬 레벨 판정 (스킬 평가 점수 기반) ============
function getSkillLevel(traineeName, processId) {
  // 스킬 평가에서 해당 인원+공정의 최신/최고 점수 조회
  const matchingEvals = state.evals.filter(e =>
    e.traineeName === traineeName && e.processId === processId
  );
  // 교육일지에서 이수 여부 확인
  const hasLog = state.logs.some(l =>
    l.processId === processId && (l.trainees||[]).includes(traineeName)
  );

  if (matchingEvals.length === 0) {
    return { level:0, score:null, trained:hasLog, lastDate:null, evals:[] };
  }

  // 최고 점수 채택
  const bestEval = matchingEvals.reduce((best,e) => (e.totalScore||0)>(best.totalScore||0)?e:best, matchingEvals[0]);
  const score = bestEval.totalScore || 0;
  const lastDate = bestEval.evalDate || bestEval.createdAt;

  let level = 0;
  if (score >= 81) level = 4;
  else if (score >= 61) level = 3;
  else if (score >= 41) level = 2;
  else if (score >= 21) level = 1;

  return { level, score, trained:hasLog, lastDate, evals:matchingEvals };
}

            const evalCount = skill.evals ? skill.evals.length : state.evals.filter(e=>e.traineeName===t.name&&e.processId===proc.id).length;
            actions = `<button data-action="addSkillUp" data-trainee="${t.name}" data-pid="${proc.id}" data-line="${proc.line}" class="text-purple-600 hover:underline text-xs">➕ 추가 스킬평가</button>` +
              (evalCount > 1 ? ` <button data-action="showEvalHistory" data-trainee="${t.name}" data-pid="${proc.id}" class="text-purple-500 hover:underline text-xs ml-1">(${evalCount}회 이력)</button>` : '');
          }
          return `<tr class="border-b hover:bg-gray-50"><td class="p-2 text-xs font-medium">${proc.name}</td><td class="p-2">${logStatus}</td><td class="p-2">${evalStatus}</td><td class="p-2">${actions}</td></tr>`;
        }).join("");
        return `<div class="mb-3"><h4 class="font-bold text-blue-700 bg-blue-50 px-3 py-2 rounded text-sm">🏭 ${line}</h4>
          <table class="w-full text-sm border"><thead class="bg-gray-100"><tr><th class="p-2 text-left">공정</th><th class="p-2 text-left">공정교육</th><th class="p-2 text-left">스킬평가</th><th class="p-2">작업</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      }).join("");
      const personResigned = t.resignDate && t.resignDate <= new Date().toISOString().slice(0,10);
      detail = `<div class="mt-4 bg-white rounded-xl shadow-lg p-6 border-t-4 ${personResigned?'border-red-400':'border-blue-600'}">
        <div class="flex justify-between items-center mb-4 pb-3 border-b">
          <div><h3 class="text-xl font-bold">👤 ${t.name} ${personResigned?'<span class="text-sm text-red-600 font-normal">(퇴사)</span>':''}</h3><p class="text-sm text-gray-500">${t.dept} · 입사 ${t.joinDate||'-'}${personResigned?' · <span class="text-red-600">퇴사 '+t.resignDate+'</span>':''}</p></div>
          <div class="flex gap-2">
            ${personResigned?'':'<button data-action="autoScheduleOne" data-name="'+t.name+'" class="bg-orange-500 text-white px-3 py-1 rounded text-xs">⚡ 자동 일정 생성</button>'}
            <button data-action="clearTrainee" class="text-gray-500 hover:text-gray-800 text-xl">✕</button>
          </div>
        </div>${lineSections}</div>`;
    }
  }

  const totalTrainees = trainees.length;
  return `<div class="max-w-7xl mx-auto p-6">${navBar('stats')}${deptTabs('stats','statsFilterDept','setStatsDept')}
    <div class="bg-white rounded-xl shadow-lg p-6 mb-4">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">📊 ${dept} 인원별 현황</h1>
      <p class="text-sm text-gray-500">공정교육 이수 + 스킬평가 현황 · 카드 클릭 시 상세</p>
      <div class="text-sm text-gray-600 mt-2">등록 인원: <b>${totalTrainees}</b>명</div>
    </div>

    ${detail}</div>`;
}

// ============ 🎯 스킬맵 ============
function renderSkill() {
  const allDepts = (state.settings.departments||[]).map(d=>d.name);
  if (!state.skillFilterDept && allDepts.length>0) state.skillFilterDept = allDepts[0];
  const dept = state.skillFilterDept;
  const deptObj = (state.settings.departments||[]).find(d=>d.name===dept);
  const deptPids = deptObj ? (deptObj.requiredProcessIds||[]) : [];
  let trainees = state.settings.trainees.filter(t=>t.dept===dept && !(t.resignDate && t.resignDate <= new Date().toISOString().slice(0,10)));
  let processes = state.settings.processes.filter(p=>deptPids.includes(p.id));
  if (state.skillFilterLine) processes = processes.filter(p=>p.line===state.skillFilterLine);

  // 매트릭스
  const matrix = processes.map(p => {
    const row = {process:p, cells:[]};
    let trainedCount = 0;
    trainees.forEach(t => {
      const skill = getSkillLevel(t.name, p.id);
      row.cells.push({trainee:t,skill});
      if (skill.level>0) trainedCount++;
    });
    row.trained = trainedCount;
    row.coverage = trainees.length ? (trainedCount/trainees.length*100) : 0;
    return row;
  });

  // 인원별 통계
  const personStats = trainees.map((t,i)=>{
    let sum=0,count=0;
    matrix.forEach(row=>{const lv=row.cells[i].skill.level;if(lv>0){sum+=lv;count++;}});
    return {trainee:t,avg:count?sum/count:0,coverage:processes.length?(count/processes.length*100):0,trained:count};
  });

  // 라인 그룹화
  const lineGroups = [];
  let curLine = null;
  matrix.forEach((row,idx)=>{
    if(row.process.line!==curLine){lineGroups.push({line:row.process.line,rows:[{row,idx}]});curLine=row.process.line;}
    else lineGroups[lineGroups.length-1].rows.push({row,idx});
  });

  const cellHtml = (cell,pName)=>{
    const c=SKILL_COLORS[cell.skill.level];
    const tip = cell.skill.level>0
      ? `${cell.trainee.name} · ${pName}\nLv ${cell.skill.level} · ${cell.skill.score}점 (${SKILL_RANGE[cell.skill.level]})\n${cell.skill.trained?'교육이수 ✅':'교육미이수'}\n최종 ${cell.skill.lastDate||'-'}`
      : `${cell.trainee.name} · ${pName}\n${cell.skill.trained?'교육이수 (평가 미실시)':'미교육'}`;
    const bgStyle = cell.skill.level>0 ? `background:${c.hex};color:${cell.skill.level>=3?'#fff':'#111'}` : 'background:#f3f4f6;color:#9ca3af';
    return `<td class="text-center font-bold cursor-pointer hover:opacity-80 border border-gray-300" style="width:60px;height:32px;font-size:12px;${bgStyle}" title="${tip}">${cell.skill.level||''}</td>`;
  };

  // 헤더 행들
  const photoRow = `<tr><th class="border border-gray-300 p-1" colspan="2" style="background:#e5e7eb;position:sticky;top:0;left:0;z-index:35;font-size:10px;">사진</th>
    ${trainees.map(t=>`<th class="border border-gray-300 p-0.5" style="width:60px;height:60px;background:#fff;position:sticky;top:0;z-index:25;">

      ${personStats.map(ps=>{const r=ps.coverage;const cls=r>=80?'background:#dcfce7':r>=50?'background:#dbeafe':r>0?'background:#fef9c3':'background:#f3f4f6';return `<td class="border border-gray-300 text-center text-xs font-bold" style="${cls}">${r.toFixed(0)}%</td>`;}).join("")}

          <td class="border border-gray-400 p-2">작업 외 설비/품질특성을 관리할 수 있는 능력<div class="text-blue-600 mt-1 font-semibold">평가 점수 : 81 ~ 100</div></td></tr>

          <div style="display:flex;gap:6px;align-items:center;font-size:9px;">

            <span style="display:inline-block;width:12px;height:12px;background:#047857;border:1px solid #ccc;"></span>4

      </div>
      <div class="bg-white rounded-xl shadow-lg p-4 overflow-auto" style="max-height:80vh;">
        ${trainees.length===0||processes.length===0?'<div class="text-center py-12 text-gray-500">데이터 없음</div>'

// ============ 📅 교육일정 ============
function renderSchedule() {
  const allDepts = (state.settings.departments||[]).map(d=>d.name);
  if (!state.scheduleFilterDept && allDepts.length>0) state.scheduleFilterDept = allDepts[0];
  const dept = state.scheduleFilterDept;
  const today = new Date().toISOString().slice(0,10);
  const mode = state.scheduleFilter||"all";

  const items = [];
  state.plans.forEach(plan => {
    const t = state.settings.trainees.find(x=>x.name===plan.traineeName);
    if (!t || t.dept !== dept) return;
    // 퇴사자의 미완료 일정은 표시 안 함
    const resigned = t.resignDate && t.resignDate <= new Date().toISOString().slice(0,10);
    const proc = findProcess(plan.processId);
    const planType = plan.type || "training";
    let done = false;
    if (planType === "training") {
      done = state.logs.some(l=>l.processId===plan.processId&&(l.trainees||[]).includes(plan.traineeName));
    } else {
      done = plan.status === "completed" || state.evals.some(e=>e.traineeName===plan.traineeName && e.processId===plan.processId && (new Date(e.evalDate||0)) >= (new Date(plan.plannedDate||0)-864e5*30));
    }
    // 퇴사자의 미완료 일정은 건너뜀
    if (resigned && !done) return;
    items.push({...plan, planType, dept:t.dept, processName:proc?proc.name:'-', line:proc?proc.line:'-',
      status:done?'done':(plan.plannedDate<today?'overdue':'pending'), done});
  });

  let filtered = items;
  if(mode==='pending') filtered=filtered.filter(i=>i.status==='pending');
  else if(mode==='overdue') filtered=filtered.filter(i=>i.status==='overdue');
  else if(mode==='done') filtered=filtered.filter(i=>i.status==='done');
  else if(mode==='month') filtered=filtered.filter(i=>i.plannedDate.startsWith(today.slice(0,7)));

  const order={overdue:0,pending:1,done:2};
  filtered.sort((a,b)=>order[a.status]-order[b.status]||(a.status==='done'?b.plannedDate.localeCompare(a.plannedDate):a.plannedDate.localeCompare(b.plannedDate)));

  const total=items.length, pendingC=items.filter(i=>i.status==='pending').length,
    overdueC=items.filter(i=>i.status==='overdue').length, doneC=items.filter(i=>i.status==='done').length;

  const badge = s => s==='done'?'<span class="bg-green-100 text-green-800 px-2 py-0.5 rounded text-xs">✅ 완료</span>'
    :s==='overdue'?'<span class="bg-red-100 text-red-800 px-2 py-0.5 rounded text-xs">⚠️ 기한초과</span>'
    :'<span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs">📅 예정</span>';

  const typeBadge = t => t==='skillEval' ? '<span class="bg-purple-100 text-purple-800 px-1.5 py-0.5 rounded text-xs">스킬평가</span>' : '<span class="bg-cyan-100 text-cyan-800 px-1.5 py-0.5 rounded text-xs">공정교육</span>';

  const rows = filtered.map((it,idx)=>{
    const days = Math.ceil((new Date(it.plannedDate)-new Date(today))/(864e5));
    let dayInfo = '';
    if (it.status==='pending') dayInfo = `<span class="text-xs text-blue-600 font-semibold">D-${days}</span>`;
    else if (it.status==='overdue') dayInfo = `<span class="text-xs text-red-600 font-bold">${-days}일 경과</span>`;
    const dateClass = it.status==='overdue' ? 'text-red-600 font-bold' : it.status==='done' ? 'text-gray-400' : '';
    let action = '';
    if (it.status !== 'done') {
      if (it.planType === 'skillEval') {
        action = `<button data-action="addSkillUp" data-trainee="${it.traineeName}" data-pid="${it.processId}" data-line="${it.line}" class="text-purple-600 hover:underline text-xs">📝 스킬평가</button>`;
      } else {
        action = `<button data-action="startLogFromPlan" data-trainee="${it.traineeName}" data-pid="${it.processId}" class="text-blue-600 hover:underline text-xs">✏️ 교육일지</button>`;
      }
    }
    return `<tr class="border-b hover:bg-blue-50${it.status==='overdue'?' bg-red-50':''}"><td class="p-2 text-center text-gray-500 text-xs">${idx+1}</td><td class="p-2">${badge(it.status)} ${typeBadge(it.planType)}</td>

  return `<div class="max-w-7xl mx-auto p-6">${navBar('schedule')}${deptTabs('schedule','scheduleFilterDept','setScheduleDept')}

      </div>

        ${['all','pending','overdue','done','month'].map(m=>`<button data-action="schFilter" data-mode="${m}" class="px-3 py-1 rounded text-sm ${mode===m?'bg-blue-600 text-white':'bg-gray-100'}">${{all:'전체',pending:'예정',overdue:'기한초과',done:'완료',month:'이번달'}[m]}</button>`).join("")}

// ============ 📝 스킬평가 목록 ============
function renderEvalList() {
  const evals = state.evals.sort((a,b)=>(b.evalDate||"").localeCompare(a.evalDate||""));

  // 인원+공정별 이력 그룹핑
  const historyMap = {};
  evals.forEach(e => {
    const key = `${e.traineeName}__${e.processId}`;
    if (!historyMap[key]) historyMap[key] = [];
    historyMap[key].push(e);
  });

  const rows = evals.map(e=>{
    const p = findProcess(e.processId);
    const pName = p ? p.name : '-';
    const c = SKILL_COLORS[e.level||0];
    const key = `${e.traineeName}__${e.processId}`;
    const histCount = (historyMap[key]||[]).length;
    const allApproved = e.approvers && e.approvers.instructor && e.approvers.instructor.approved && e.approvers.manager && e.approvers.manager.approved;
    return `<tr class="border-b hover:bg-blue-50">
      <td class="p-2 text-xs">${e.evalDate||'-'}</td><td class="p-2">${e.traineeName||'-'}</td>
      <td class="p-2">${e.line||'-'}</td><td class="p-2 font-medium">${pName}</td>
      <td class="p-2">${e.evaluatorName||'-'}</td>
      <td class="p-2 text-center"><span class="px-2 py-0.5 rounded text-xs font-bold" style="background:${c.hex};color:${e.level>=3?'#fff':'#111'}">Lv${e.level} (${e.totalScore}점)</span></td>
      <td class="p-2 text-center">${allApproved?'✅':'⏳'}</td>
      <td class="p-2 text-center">${histCount > 1 ? `<button data-action="showEvalHistory" data-trainee="${e.traineeName}" data-pid="${e.processId}" class="text-purple-600 hover:underline text-xs font-bold">${histCount}회</button>` : '<span class="text-gray-400 text-xs">1회</span>'}</td>
      <td class="p-2 text-right">
        <button data-action="addSkillUp" data-trainee="${e.traineeName}" data-pid="${e.processId}" data-line="${e.line||''}" class="text-green-600 hover:underline text-xs mr-1" title="추가 스킬업">➕추가</button>
        <button data-action="printEval" data-id="${e.id}" class="text-gray-600 hover:underline text-xs mr-1">🖨️</button>
        <button data-action="editEval" data-id="${e.id}" class="text-blue-600 hover:underline text-xs mr-1">수정</button>
        <button data-action="delEval" data-id="${e.id}" class="text-red-600 hover:underline text-xs">삭제</button>
      </td></tr>`;
  }).join("");

  // 이력 상세 (모달 대신 하단에 표시)
  let historyHtml = '';
  if (state.evalHistoryKey) {
    const histEvals = historyMap[state.evalHistoryKey] || [];
    const [tn, pidStr] = state.evalHistoryKey.split("__");
    const proc = findProcess(parseInt(pidStr));
    historyHtml = `
      <div class="bg-purple-50 rounded-xl shadow-lg p-6 mt-4 border-t-4 border-purple-600">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-lg font-bold text-purple-800">📊 스킬 평가 이력: ${tn} · ${proc?proc.name:'-'}</h2>
          <button data-action="closeEvalHistory" class="text-gray-500 hover:text-gray-800 text-xl">✕</button>
        </div>
        <table class="w-full text-sm bg-white rounded">
          <thead class="bg-gray-100"><tr><th class="p-2">#</th><th class="p-2">평가일</th><th class="p-2">평가자</th><th class="p-2 text-center">점수</th><th class="p-2 text-center">레벨</th><th class="p-2 text-center">결재</th><th class="p-2">비고</th></tr></thead>
          <tbody>${histEvals.sort((a,b)=>(a.evalDate||"").localeCompare(b.evalDate||"")).map((he,i)=>{
            const hc = SKILL_COLORS[he.level||0];
            const hApproved = he.approvers && he.approvers.instructor && he.approvers.instructor.approved && he.approvers.manager && he.approvers.manager.approved;
            return `<tr class="border-b"><td class="p-2 text-center">${i+1}</td><td class="p-2">${he.evalDate||'-'}</td><td class="p-2">${he.evaluatorName||'-'}</td>
              <td class="p-2 text-center font-bold">${he.totalScore}</td>
              <td class="p-2 text-center"><span class="px-2 py-0.5 rounded text-xs font-bold" style="background:${hc.hex};color:${he.level>=3?'#fff':'#111'}">Lv${he.level}</span></td>
              <td class="p-2 text-center">${hApproved?'✅':'⏳'}</td>
              <td class="p-2 text-xs text-gray-500">${he.reference||''}</td></tr>`;
          }).join("")}</tbody>
        </table>
        <div class="mt-3 text-center">
          <button data-action="addSkillUp" data-trainee="${tn}" data-pid="${pidStr}" data-line="${histEvals[0]?histEvals[0].line:''}" class="bg-green-600 text-white px-4 py-2 rounded font-semibold text-sm">➕ 추가 스킬평가 실시</button>
        </div>
      </div>`;

function renderEvalForm() {
  const ev = state.currentEval;

  const instrOpts = state.settings.instructors.map(i=>`<option value="${i.name}" ${ev.evaluatorName===i.name?'selected':''}>${i.name} (${i.dept})</option>`).join("");
  const traineeOpts = state.settings.trainees.map(t=>`<option value="${t.name}" ${ev.traineeName===t.name?'selected':''}>${t.name} (${t.dept})</option>`).join("");
  const mgrCandidates = [...new Set(state.settings.instructors.filter(i=>i.isManager).map(i=>i.name))];
  const defaultMgr = (ev.approvers&&ev.approvers.manager.name) || "";

  // 평가 항목: 저장된 기준 사용 (없으면 현재 설정에서)
  const criteria = ev.criteria || getEvalCriteria();

  const itemRows = criteria.map((c,idx)=>`
    <tr class="border-b">

        <div><label class="block text-sm font-semibold mb-1">공정</label>
          <select id="evalProcess" class="w-full border rounded px-3 py-2"><option value="">-- 공정 --</option>${lineProcs.map(p=>`<option value="${p.id}" ${ev.processId===p.id?'selected':''}>${p.name}</option>`).join("")}</select></div>

// ============ ✅ 결재함 ============
function renderApprovals() {
  const allItems = [];
  state.logs.forEach(l=>{
    const a=l.approvers;if(!a)return;
    const done=a.instructor.approved&&a.manager.approved;
    const p=findProcess(l.processId);
    allItems.push({type:'교육일지',id:l.id,name:p?p.name:(l.courseName||'-'),trainee:(l.trainees||[]).join(','),date:l.startDate,
      instructor:a.instructor, manager:a.manager, done, printAction:'print'});
  });
  state.evals.forEach(e=>{
    const a=e.approvers;if(!a)return;
    const done=a.instructor.approved&&a.manager.approved;
    const p=findProcess(e.processId);
    allItems.push({type:'스킬평가',id:e.id,name:p?p.name:'-',trainee:e.traineeName,date:e.evalDate,
      instructor:a.instructor, manager:a.manager, done, printAction:'editEval'});
  });

  const pending=allItems.filter(i=>!i.done).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const completed=allItems.filter(i=>i.done).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const renderItem = (it)=>{
    const instOk=it.instructor.approved, mgrOk=it.manager.approved;
    const stepBox=(label,name,ok)=>ok
      ?`<div class="bg-green-50 border border-green-300 rounded px-3 py-2 text-center"><div class="text-xs text-gray-500">${label}</div><div class="font-bold text-green-700">${name||'-'} ✓</div></div>`
      :`<div class="bg-gray-50 border border-gray-300 rounded px-3 py-2 text-center"><div class="text-xs text-gray-500">${label}</div><div class="font-bold text-gray-400">${name||'(미지정)'}</div></div>`;
    let btn='';
    if(!instOk&&it.instructor.name) btn=`<button data-action="approveStep" data-id="${it.id}" data-step="instructor" data-type="${it.type}" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-semibold">담당자 (${it.instructor.name}) 승인</button>`;
    else if(!mgrOk&&it.manager.name&&instOk) btn=`<button data-action="approveStep" data-id="${it.id}" data-step="manager" data-type="${it.type}" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-semibold">부서장 (${it.manager.name}) 승인</button>`;
    return `<div class="bg-white rounded-lg shadow border-l-4 ${it.done?'border-green-500':'border-blue-500'} p-4 mb-3">
      <div class="flex justify-between items-start mb-3"><div><div class="text-xs text-gray-500">${it.type} · ${it.date||'-'}</div><div class="font-bold text-lg">${it.name}</div><div class="text-xs text-gray-500">대상: ${it.trainee||'-'}</div></div></div>
      <div class="grid grid-cols-2 gap-2 mb-3">${stepBox("담당자",it.instructor.name,instOk)}${stepBox("부서장",it.manager.name,mgrOk)}</div>
      ${btn?`<div class="flex justify-end">${btn}</div>`:''}</div>`;
  };

  return `<div class="max-w-5xl mx-auto p-6">${navBar('approvals')}
    <div class="bg-white rounded-xl shadow-lg p-6 mb-4"><h1 class="text-2xl font-bold">✅ 결재함</h1>
      <div class="grid grid-cols-2 gap-3 mt-4">
        <div class="bg-blue-50 p-3 rounded"><div class="text-xs text-gray-600">대기</div><div class="text-2xl font-bold text-blue-700">${pending.length}</div></div>
        <div class="bg-green-50 p-3 rounded"><div class="text-xs text-gray-600">완료</div><div class="text-2xl font-bold text-green-700">${completed.length}</div></div>
      </div>
    </div>
    ${pending.length>0?`<div class="mb-6"><h2 class="text-lg font-bold text-blue-700 mb-3">🔔 대기 (${pending.length})</h2>${pending.map(renderItem).join("")}</div>`:''}
    ${completed.length>0?`<div class="mb-6"><h2 class="text-lg font-bold text-green-700 mb-3">✅ 완료 (${completed.length})</h2>${completed.slice(0,20).map(renderItem).join("")}</div>`:''}
    ${pending.length===0&&completed.length===0?'<div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">결재 대상이 없습니다</div>':''}
  </div>`;
}

// 공정교육 템플릿 다운로드
function downloadTrainingTemplate() {
  const depts = state.settings.departments || [];
  const wb = XLSX.utils.book_new();

  depts.forEach(dept => {
    const trainees = state.settings.trainees.filter(t => t.dept === dept.name);
    const procs = state.settings.processes.filter(p => (dept.requiredProcessIds||[]).includes(p.id));
    if (trainees.length === 0 || procs.length === 0) return;

    // 헤더: 이름 | 부서 | 공정1 | 공정2 | ...
    const headers = ["이름", "부서", ...procs.map(p => `${p.line} / ${p.name}`)];
    const procIds = ["_name", "_dept", ...procs.map(p => p.id)]; // 숨김 ID 행

    const data = [headers];
    // ID 행 (숨김용 - 업로드 시 공정 매핑에 사용)
    data.push(["(공정ID)", "", ...procs.map(p => p.id)]);

    trainees.forEach(t => {
      const row = [t.name, t.dept || dept.name];
      procs.forEach(p => {
        // 이미 교육 이수한 경우 날짜 미리 채우기
        const log = state.logs.find(l => l.processId === p.id && (l.trainees||[]).includes(t.name));
        row.push(log ? (log.startDate || "이수") : "");
      });
      data.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);
    // 열 너비 설정
    ws['!cols'] = [{ wch: 12 }, { wch: 8 }, ...procs.map(() => ({ wch: 16 }))];
    XLSX.utils.book_append_sheet(wb, ws, dept.name);
  });

  XLSX.writeFile(wb, `공정교육_일괄입력_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// 스킬평가 템플릿 다운로드
function downloadEvalTemplate() {
  const depts = state.settings.departments || [];
  const wb = XLSX.utils.book_new();

  depts.forEach(dept => {
    const trainees = state.settings.trainees.filter(t => t.dept === dept.name);
    const procs = state.settings.processes.filter(p => (dept.requiredProcessIds||[]).includes(p.id));
    if (trainees.length === 0 || procs.length === 0) return;

    const headers = ["이름", "부서", "평가자", "평가일", ...procs.map(p => `${p.line} / ${p.name}`)];
    const data = [headers];
    data.push(["(공정ID)", "", "", "", ...procs.map(p => p.id)]);

    trainees.forEach(t => {
      const row = [t.name, t.dept || dept.name, "", ""];
      procs.forEach(p => {
        // 이미 스킬평가가 있으면 최고 점수 미리 채우기

}

// 공정교육 엑셀 업로드 파싱
function uploadTrainingExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      let totalAdded = 0;

      wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false });
        if (data.length < 3) return; // 헤더 + ID행 + 최소 1명

        const headers = data[0];
        const idRow = data[1]; // 공정 ID 행

        for (let r = 2; r < data.length; r++) {
          const row = data[r];
          const traineeName = (row[0]||"").trim();
          if (!traineeName) continue;

          for (let c = 2; c < headers.length; c++) {
            const cellVal = (row[c]||"").toString().trim();
            if (!cellVal) continue;

            const processId = parseInt(idRow[c]);
            if (!processId || isNaN(processId)) continue;

            // 이미 이 인원+공정 교육일지가 있으면 스킵
            const exists = state.logs.some(l => l.processId === processId && (l.trainees||[]).includes(traineeName));
            if (exists) continue;

            // 날짜 파싱
            let dateStr = cellVal;
            if (cellVal === "이수") dateStr = new Date().toISOString().slice(0,10);
            else if (cellVal instanceof Date) dateStr = cellVal.toISOString().slice(0,10);
            else {
              // 다양한 날짜 형식 처리
              const cleaned = cellVal.replace(/\./g, '-').replace(/\//g, '-');
              const d = new Date(cleaned);
              dateStr = isNaN(d.getTime()) ? new Date().toISOString().slice(0,10) : d.toISOString().slice(0,10);
            }

            const proc = findProcess(processId);
            const log = {
              id: Date.now() + Math.random(),
              line: proc ? proc.line : "",
              processId: processId,
              courseName: proc ? proc.name : "",
              instructorName: "일괄입력",
              instructorPosition: "",
              instructorDept: sheetName,
              startDate: dateStr,
              endDate: dateStr,
              hours: 2,
              evalMethod: "일괄입력",
              trainees: [traineeName],
              content: proc ? (proc.content || "일괄 입력으로 등록됨") : "일괄 입력으로 등록됨",
              instructorEval: "",
              scores: [5,5,5,5,5],
              opinion: "",
              approvers: { instructor:{name:"일괄입력",approved:true,approvedAt:dateStr}, manager:{name:"일괄입력",approved:true,approvedAt:dateStr} },
              createdAt: new Date().toISOString(),
              bulkImported: true
            };
            state.logs.push(log);
            totalAdded++;

            // 6개월 후 스킬평가 일정 자동 생성
            generateSkillEvalSchedule(traineeName, processId, dateStr);
          }
        }
      });

      if (totalAdded > 0) {
        saveLogs(state.logs);
        alert(`✅ 공정교육 ${totalAdded}건이 일괄 등록되었습니다.\n(이미 있는 기록은 건너뛰었습니다)`);
        render();
      } else {
        alert("새로 등록할 교육 기록이 없습니다.\n(모두 이미 등록되어 있거나 빈 셀입니다)");
      }
    } catch(err) {
      alert("엑셀 파싱 오류: " + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// 스킬평가 엑셀 업로드 파싱
function uploadEvalExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      let totalAdded = 0;

      wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false });
        if (data.length < 3) return;

        const headers = data[0];
        const idRow = data[1];

        for (let r = 2; r < data.length; r++) {
          const row = data[r];
          const traineeName = (row[0]||"").trim();
          if (!traineeName) continue;
          const evaluator = (row[2]||"일괄입력").toString().trim();
          let evalDate = (row[3]||"").toString().trim();
          if (!evalDate) evalDate = new Date().toISOString().slice(0,10);
          else {
            const cleaned = evalDate.replace(/\./g, '-').replace(/\//g, '-');
            const d = new Date(cleaned);
            evalDate = isNaN(d.getTime()) ? new Date().toISOString().slice(0,10) : d.toISOString().slice(0,10);
          }

          for (let c = 4; c < headers.length; c++) {
            const cellVal = (row[c]||"").toString().trim();
            if (!cellVal) continue;
            const score = parseFloat(cellVal);
            if (isNaN(score) || score <= 0) continue;

            const processId = parseInt(idRow[c]);
            if (!processId || isNaN(processId)) continue;

            const totalScore = Math.min(100, Math.max(0, Math.round(score)));
            let level = 0;
            if (totalScore >= 81) level = 4;
            else if (totalScore >= 61) level = 3;
            else if (totalScore >= 41) level = 2;
            else if (totalScore >= 21) level = 1;

            const proc = findProcess(processId);
            // 10개 항목에 점수를 균등 분배
            const perItem = Math.round(totalScore / 10);
            const scores = Array(10).fill(perItem);
            // 나머지 보정
            const diff = totalScore - scores.reduce((a,b)=>a+b,0);
            if (diff !== 0) scores[0] += diff;

            const ev = {
              id: Date.now() + Math.random(),
              traineeName: traineeName,
              processId: processId,
              line: proc ? proc.line : "",
              evaluatorName: evaluator,
              evalDate: evalDate,
              period: "",
              scores: scores,
              contents: Array(10).fill(""),
              remarks: Array(10).fill(""),
              totalScore: totalScore,
              level: level,
              reference: "엑셀 일괄 입력",
              criteria: JSON.parse(JSON.stringify(getEvalCriteria())),
              approvers: { instructor:{name:evaluator,approved:true,approvedAt:evalDate}, manager:{name:"일괄입력",approved:true,approvedAt:evalDate} },
              createdAt: new Date().toISOString(),
              bulkImported: true
            };
            state.evals.push(ev);
            totalAdded++;
          }
        }
      });

      if (totalAdded > 0) {
        saveEvals(state.evals);
        alert(`✅ 스킬평가 ${totalAdded}건이 일괄 등록되었습니다.`);
        render();
      } else {
        alert("새로 등록할 스킬평가가 없습니다.\n(빈 셀이거나 0점입니다)");
      }
    } catch(err) {
      alert("엑셀 파싱 오류: " + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

      <p class="text-sm text-gray-600">부서별로 필수 교육 공정을 지정합니다. 피교육자가 해당 부서 소속이면 여기 체크된 모든 공정 교육을 받아야 합니다.</p>
      <button data-action="addDept" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">+ 부서 추가</button>
    </div>
    ${sections || '<div class="text-center text-gray-500 py-8 border rounded">등록된 부서가 없습니다.</div>'}`;
}

function renderProcessSettings() {
  if (state.editingProcessIdx >= 0) {
    const isNew = state.editingProcessIdx >= state.settings.processes.length;
    const p = isNew ? { id:0, line:state.settings.lines[0]||"", name:"", content:"" }
                    : state.settings.processes[state.editingProcessIdx];
    const lineOpts = state.settings.lines.map(l=>`<option ${p.line===l?'selected':''}>${l}</option>`).join("");
    return `
      <div class="border rounded-lg p-4 bg-gray-50">
        <h3 class="font-semibold mb-3">${isNew?'➕ 새 공정 추가':'✏️ 공정 편집'}</h3>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-sm font-semibold mb-1">소속 라인 (= 장소)</label>
            <select id="p_line" class="w-full border rounded px-3 py-2">${lineOpts}</select>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1">공정명</label>
            <input id="p_name" value="${p.name}" class="w-full border rounded px-3 py-2">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-semibold mb-1">교육 내용</label>
            <textarea id="p_content" rows="16" class="w-full border rounded px-3 py-2 font-mono text-xs">${p.content}</textarea>
          </div>
        </div>
        <div class="flex gap-2 justify-end">
          <button data-action="cancelProcess" class="bg-gray-500 text-white px-4 py-2 rounded">취소</button>
          <button data-action="saveProcess" class="bg-blue-600 text-white px-4 py-2 rounded font-medium">저장</button>
        </div>
      </div>`;
  }

  const byLine = {};
  state.settings.processes.forEach((p,i) => {
    const l = p.line || "(미지정)";
    if (!byLine[l]) byLine[l] = [];
    byLine[l].push({ p, i });
  });

  const groups = Object.keys(byLine).map(line => `
    <div class="mb-4">
      <h4 class="font-bold text-blue-700 mb-2 bg-blue-50 px-3 py-1.5 rounded">🏭 ${line} <span class="text-xs text-gray-500">(${byLine[line].length}개 공정)</span></h4>
      <table class="w-full text-sm border">
        <thead class="bg-gray-100">
          <tr><th class="p-2 text-left w-12">#</th><th class="p-2 text-left">공정명</th><th class="p-2 text-right w-32">작업</th></tr>
        </thead>
        <tbody>
          ${byLine[line].map((item,j)=>`
            <tr class="border-b hover:bg-gray-50">
              <td class="p-2">${j+1}</td>
              <td class="p-2 font-medium">${item.p.name}</td>
              <td class="p-2 text-right">
                <button data-action="editProcess" data-idx="${item.i}" class="text-blue-600 hover:underline mr-2">편집</button>
                <button data-action="delProcess" data-idx="${item.i}" class="text-red-600 hover:underline">삭제</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `).join("");

  return `
    <div class="flex justify-between items-center mb-3">
      <p class="text-sm text-gray-600">라인별로 공정을 관리합니다. 먼저 '라인 관리'에서 라인을 등록하세요.</p>
      <button data-action="addProcess" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">+ 공정 추가</button>
    </div>
    ${groups || '<div class="text-center text-gray-500 py-8 border rounded">등록된 공정이 없습니다.</div>'}`;
}

// ============ Event Handlers ============
function attachHandlers() {
  document.querySelectorAll("[data-action]").forEach(el=>el.addEventListener("click",handleAction));
  // 교육일지 라인/공정 변경
  const ls=document.getElementById("lineSelect");
  if(ls) ls.addEventListener("change",e=>{state.currentLog.line=e.target.value;state.currentLog.processId=null;state.currentLog.content="";render();});
  const ps=document.getElementById("processSelect");
  if(ps) ps.addEventListener("change",e=>{
    const id=parseInt(e.target.value);const tpl=findProcess(id);
    if(tpl){state.currentLog.processId=id;state.currentLog.courseName=tpl.name;
      if(tpl.content&&confirm("교육 내용을 불러오시겠습니까?"))state.currentLog.content=tpl.content;}render();
  });
  const is=document.getElementById("instructorSelect");
  if(is) is.addEventListener("change",e=>{
    const inst=state.settings.instructors.find(i=>i.name===e.target.value);
    if(inst){state.currentLog.instructorName=inst.name;state.currentLog.instructorPosition=inst.position;state.currentLog.instructorDept=inst.dept;}
  });
  // 피교육자 체크박스
  document.querySelectorAll(".trainee-cb").forEach(cb=>cb.addEventListener("change",()=>{
    state.currentLog.trainees=[...document.querySelectorAll(".trainee-cb:checked")].map(c=>c.value);
  }));
  // 스킬평가 폼
  const el=document.getElementById("evalLine");
  if(el) el.addEventListener("change",e=>{state.currentEval.line=e.target.value;state.currentEval.processId=null;render();});
  const ep=document.getElementById("evalProcess");
  if(ep) ep.addEventListener("change",e=>{state.currentEval.processId=parseInt(e.target.value);});
  const et=document.getElementById("evalTrainee");
  if(et) et.addEventListener("change",e=>{state.currentEval.traineeName=e.target.value;});
  const ee=document.getElementById("evalEvaluator");
  if(ee) ee.addEventListener("change",e=>{state.currentEval.evaluatorName=e.target.value;});
  // 스킬평가 점수 실시간 합계
  document.querySelectorAll(".eval-score").forEach(sel=>sel.addEventListener("input",e=>{
    const idx=parseInt(e.target.dataset.idx);
    let val=parseInt(e.target.value)||0;
    if(val<0)val=0;if(val>10)val=10;e.target.value=val;
    state.currentEval.scores[idx]=val;
    const total=state.currentEval.scores.reduce((a,b)=>a+b,0);
    const tel=document.getElementById("evalTotal");if(tel)tel.textContent=total;
    let lv=0;if(total>=81)lv=4;else if(total>=61)lv=3;else if(total>=41)lv=2;else if(total>=21)lv=1;
    const lel=document.getElementById("evalLevel");if(lel)lel.textContent=total+'점 → 레벨 '+lv;
  }));
  // 스킬맵 라인 필터
  const skLine=document.getElementById("skillLineFilter");
  if(skLine) skLine.addEventListener("change",e=>{state.skillFilterLine=e.target.value;render();});

  // ===== 설정 관련 이벤트 리스너 =====
  document.querySelectorAll(".dept-process-cb").forEach(cb => {
    cb.addEventListener("change", e => {
      const didx = parseInt(e.target.dataset.didx);
      const pid = parseInt(e.target.dataset.pid);
      const dept = state.settings.departments[didx];
      if (!dept.requiredProcessIds) dept.requiredProcessIds = [];
      if (e.target.checked) {
        if (!dept.requiredProcessIds.includes(pid)) dept.requiredProcessIds.push(pid);
      } else {
        dept.requiredProcessIds = dept.requiredProcessIds.filter(x=>x!==pid);
      }
      saveSettings(state.settings);
      render();
    });
  });

  // 부서장 선택
  document.querySelectorAll(".dept-manager-select").forEach(sel => {
    sel.addEventListener("change", e => {
      const didx = parseInt(e.target.dataset.didx);
      state.settings.departments[didx].manager = e.target.value;
      saveSettings(state.settings);
    });
  });

  // 강사 - 부서장 여부 체크박스
  document.querySelectorAll(".instructor-mgr-cb").forEach(cb => {
    cb.addEventListener("change", e => {
      const i = parseInt(e.target.dataset.idx);
      state.settings.instructors[i].isManager = e.target.checked;
      saveSettings(state.settings);
    });
  });

  // 부서명 편집
  document.querySelectorAll(".dept-name-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const i = parseInt(e.target.dataset.idx);
      state.settings.departments[i].name = e.target.value;
      saveSettings(state.settings);
    });
  });

  // 인원/강사 필드 편집 (이름, 직위, 부서, 입사일, 비밀번호 등)
  document.querySelectorAll(".people-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const k = e.target.dataset.key, i = parseInt(e.target.dataset.idx), f = e.target.dataset.field;
      if (k && state.settings[k] && state.settings[k][i]) {
        state.settings[k][i][f] = e.target.value;
        saveSettings(state.settings);
      }
    });
  });

  // 간단 목록 편집 (라인, 평가방법)
  document.querySelectorAll(".simple-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const k = e.target.dataset.key, i = parseInt(e.target.dataset.idx);
      if (k && state.settings[k]) {
        state.settings[k][i] = e.target.value;
        saveSettings(state.settings);
      }
    });
  });

  // 사진 업로드 (자동 리사이즈 + JPEG 압축)
  document.querySelectorAll(".photo-upload").forEach(inp => {
    inp.addEventListener("change", e => {
      const file = e.target.files[0]; if (!file) return;
      const idx = parseInt(e.target.dataset.idx);
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const size = 120;
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          const min = Math.min(img.width, img.height);
          const sx = (img.width - min) / 2, sy = (img.height - min) / 2;
          ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
          state.settings.trainees[idx].photo = canvas.toDataURL("image/jpeg", 0.85);
          saveSettings(state.settings);
          render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  });

  // 일괄 입력 엑셀 업로드
  const uploadTraining = document.getElementById("uploadTrainingExcel");
  if (uploadTraining) uploadTraining.addEventListener("change", e => {
    const f = e.target.files[0]; if (f) uploadTrainingExcel(f);
  });
  const uploadEval = document.getElementById("uploadEvalExcel");
  if (uploadEval) uploadEval.addEventListener("change", e => {
    const f = e.target.files[0]; if (f) uploadEvalExcel(f);
  });

  // 이메일 수신자 편집
  document.querySelectorAll(".email-recipient-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const i = parseInt(e.target.dataset.idx);
      if (!state.settings.emailRecipients) state.settings.emailRecipients = [];
      state.settings.emailRecipients[i] = e.target.value.trim();
      saveSettings(state.settings);
    });
  });

  // 계획 일정 입력 (date input)
  document.querySelectorAll(".plan-date-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const action = e.target.dataset.action;
      const trainee = e.target.dataset.trainee;
      const pid = parseInt(e.target.dataset.pid);
      const date = e.target.value;
      if (!date) return;
      if (action === "addPlan") {
        state.plans.push({ traineeName: trainee, processId: pid, plannedDate: date, status: "planned" });
      } else if (action === "updatePlan" || action === "updatePlanFromSchedule") {
        const plan = state.plans.find(p => p.traineeName===trainee && p.processId===pid);
        if (plan) plan.plannedDate = date;
      }
      savePlans(state.plans);
      render();
    });
  });

  const imp = document.getElementById("importSettings");
  if (imp) imp.addEventListener("change", e => {
    const f = e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = ev => {
      try { state.settings = JSON.parse(ev.target.result); saveSettings(state.settings); render(); alert("설정 가져오기 완료"); }
      catch(err) { alert("파일 오류"); }
    };
    rd.readAsText(f);
  });

  // 전체 백업 복원
  const impBackup = document.getElementById("importFullBackup");
  if (impBackup) impBackup.addEventListener("change", e => {
    const f = e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = ev => {
      try {
        const backup = JSON.parse(ev.target.result);
        if (!backup.settings && !backup.logs) { alert("유효한 백업 파일이 아닙니다."); return; }
        if (!confirm(`백업 복원 (${backup.exportDate||'날짜 미상'})\n\n현재 데이터가 모두 덮어쓰여집니다. 계속하시겠습니까?`)) return;
        if (backup.settings) { state.settings = backup.settings; localStorage.setItem(SETTINGS_KEY, JSON.stringify(backup.settings)); }
        if (backup.logs) { state.logs = backup.logs; localStorage.setItem(LOGS_KEY, JSON.stringify(backup.logs)); }
        if (backup.plans) { state.plans = backup.plans; localStorage.setItem(PLANS_KEY, JSON.stringify(backup.plans)); }
        syncToGoogle("all"); // 구글에도 업로드
        render();
        alert("✅ 백업 복원 완료!");
      } catch(err) { alert("파일 오류: " + err.message); }
    };
    rd.readAsText(f);
  });
}

function handleAction(e) {
  const btn=e.target.closest("[data-action]");if(!btn)return;
  const action=btn.dataset.action, id=parseInt(btn.dataset.id), idx=parseInt(btn.dataset.idx), key=btn.dataset.key;

  switch(action) {
    case "goStats": state.view="stats";state.selectedTrainee=null;render();break;
    case "goSkill": state.view="skill";render();break;
    case "goSchedule": state.view="schedule";render();break;
    case "goList": state.view="list";state.logs=loadLogs();render();break;
    case "goEvalList": state.view="evalList";render();break;
    case "goApprovals": state.view="approvals";render();break;
    case "goSettings":
      if(!state.settingsUnlocked){const pw=prompt("관리자 비밀번호:");if(pw!==ADMIN_PASSWORD){alert("비밀번호 불일치");return;}state.settingsUnlocked=true;}
      state.view="settings";render();break;
    case "lockSettings": state.settingsUnlocked=false;state.view="stats";render();break;
    case "setStatsDept": state.statsFilterDept=btn.dataset.dept;state.selectedTrainee=null;render();break;
    case "setSkillDept": state.skillFilterDept=btn.dataset.dept;state.skillFilterLine="";render();break;
    case "setScheduleDept": state.scheduleFilterDept=btn.dataset.dept;render();break;
    case "schFilter": state.scheduleFilter=btn.dataset.mode;render();break;
    case "selectTrainee": state.selectedTrainee=btn.dataset.name;render();break;
    case "clearTrainee": state.selectedTrainee=null;render();break;

    // 교육일지
    case "new": state.currentLog=newLog();state.view="edit";render();break;
    case "startLogFromPlan": {
      const tn=btn.dataset.trainee,pid=parseInt(btn.dataset.pid),proc=findProcess(pid);
      if(!proc){alert("공정 없음");return;}
      const log=newLog();log.processId=pid;log.courseName=proc.name;log.line=proc.line;log.content=proc.content||"";log.trainees=[tn];

      document.querySelectorAll(".ec-title").forEach(el => { criteria[parseInt(el.dataset.idx)].title = el.value; });
      document.querySelectorAll(".ec-lv0").forEach(el => { criteria[parseInt(el.dataset.idx)].lv0 = el.value; });
      document.querySelectorAll(".ec-lv5").forEach(el => { criteria[parseInt(el.dataset.idx)].lv5 = el.value; });
      document.querySelectorAll(".ec-lv10").forEach(el => { criteria[parseInt(el.dataset.idx)].lv10 = el.value; });
      state.settings.evalCriteria = criteria;
      saveSettings(state.settings);
      alert("스킬 평가 항목이 저장되었습니다.\n기존 평가는 변경되지 않으며, 새로 작성하는 평가부터 적용됩니다.");
      render(); break;
    }
    case "resetEvalCriteria":
      if(confirm("스킬 평가 항목을 기본값으로 되돌리시겠습니까?")){
        state.settings.evalCriteria=JSON.parse(JSON.stringify(DEFAULT_EVAL_CRITERIA));
        saveSettings(state.settings);render();
      }break;

    case "downloadTrainingTemplate": downloadTrainingTemplate(); break;
    case "downloadEvalTemplate": downloadEvalTemplate(); break;

    case "addEmailRecipient": {
      if (!state.settings.emailRecipients) state.settings.emailRecipients = [];
      state.settings.emailRecipients.push("");
      saveSettings(state.settings); render();
      break;
    }
    case "delEmailRecipient": {
      const i = parseInt(btn.dataset.idx);
      state.settings.emailRecipients.splice(i, 1);
      saveSettings(state.settings); render();
      break;
    }
    case "sendTestEmail": {
      const emailType = btn.dataset.type;
      const recipients = state.settings.emailRecipients || [];
      if (recipients.filter(e=>e.trim()).length === 0) {
        alert("수신자를 먼저 등록하세요.");
        break;
      }
      if (!confirm(`${emailType==='day1'?'매월 1일용':'매월 20일용'} 테스트 메일을 ${recipients.filter(e=>e.trim()).length}명에게 발송합니다.\n계속하시겠습니까?`)) break;

      fetch(GOOGLE_SYNC_URL, {
        method: "POST", mode: "no-cors",
        headers: {"Content-Type":"text/plain"},
        body: JSON.stringify({
          type: "testEmail",
          emailType: emailType,
          recipients: recipients.filter(e=>e.trim()),
          settings: state.settings,
          logs: state.logs,
          plans: state.plans
        })
      }).then(() => {
        alert("✅ 메일 발송 요청 완료!\n(Google에서 실제 메일 발송까지 1~2분 소요됩니다)\n받은편지함을 확인해주세요.");
      }).catch(err => {
        alert("❌ 메일 발송 실패: " + err.message);
      });
      break;
    }

    case "resetSettings":
      if(confirm("초기화?")){state.settings=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));saveSettings(state.settings);render();}break;
    case "exportFullBackup": {
      const b={version:"v5",date:new Date().toISOString(),settings:state.settings,logs:state.logs,plans:state.plans,evals:state.evals};
      const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(b,null,2)],{type:"application/json"}));
      a.download="MFG_교육관리_백업_"+new Date().toISOString().slice(0,10)+".json";a.click();break;
    }
    case "uploadAllToGoogle":
      if(confirm("전체 업로드?")){syncToGoogle("all").then(()=>{alert(syncStatus.error?"오류: "+syncStatus.error:"업로드 완료!");render();});}break;
    case "downloadAllFromGoogle":
      if(confirm("구글에서 다운로드?")){syncFromGoogle().then(u=>{if(u){render();alert("다운로드 완료!");}else alert(syncStatus.error||"데이터 없음");});}break;
  }
}

// ============ 시작 ============
(async function(){
  render();
  if(GOOGLE_SYNC_URL){const u=await syncFromGoogle();if(u)render();
    else if(!syncStatus.error&&state.settings&&state.settings.lines&&state.settings.lines.length>0)syncToGoogle("all");}
})();
</script>
</body>
</html>
