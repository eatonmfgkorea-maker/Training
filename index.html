// ============ Google Sync ============
function getSyncUrl() { return GOOGLE_SYNC_URL; }
function setSyncUrl(url) { /* 고정 URL - 변경 불가 */ }

let syncStatus = { last: "", error: "", syncing: false };

async function syncToGoogle(type) {
  const url = getSyncUrl();
  if (!url) return;
  syncStatus.syncing = true;
  updateSyncBadge();
  try {
    const payload = { type };
    if (type === "all" || type === "settings") payload.settings = state.settings;
    if (type === "all" || type === "logs") payload.logs = state.logs;
    if (type === "all" || type === "plans") payload.plans = state.plans;
    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    const result = await resp.json();
    if (result.success) {
      syncStatus.last = new Date().toLocaleString("ko-KR");
      syncStatus.error = "";
    } else {
      syncStatus.error = result.error || "알 수 없는 오류";
    }
  } catch(err) {
    syncStatus.error = err.message;
  }
  syncStatus.syncing = false;
  updateSyncBadge();
}

async function syncFromGoogle() {
  const url = getSyncUrl();
  if (!url) return false;
  syncStatus.syncing = true;
  updateSyncBadge();
  try {
    const resp = await fetch(url + "?type=all");
    const result = await resp.json();
    if (result.success) {
      let updated = false;
      // 구글에 유효한 데이터가 있을 때만 덮어쓰기
      if (result.settings && typeof result.settings === "object" && result.settings.lines) {
        state.settings = result.settings;
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
        updated = true;
      }
      if (result.logs && Array.isArray(result.logs) && result.logs.length > 0) {
        state.logs = result.logs;
        localStorage.setItem(LOGS_KEY, JSON.stringify(state.logs));
        updated = true;
      }
      if (result.plans && Array.isArray(result.plans) && result.plans.length > 0) {
        state.plans = result.plans;
        localStorage.setItem(PLANS_KEY, JSON.stringify(state.plans));
        updated = true;
      }
      syncStatus.last = new Date().toLocaleString("ko-KR");
      syncStatus.error = "";
      syncStatus.syncing = false;
      updateSyncBadge();
      return updated;
    } else {
      syncStatus.error = result.error || "서버 오류";
    }
  } catch(err) {
    syncStatus.error = err.message;
  }
  syncStatus.syncing = false;
  updateSyncBadge();
  return false;
}

function updateSyncBadge() {
  const el = document.getElementById("syncBadge");
  if (!el) return;
  if (syncStatus.syncing) {
    el.innerHTML = '<span class="text-blue-600">⟳ 동기화 중...</span>';
  } else if (syncStatus.error) {
    el.innerHTML = `<span class="text-red-600" title="${syncStatus.error}">⚠ 동기화 오류</span>`;
  } else if (syncStatus.last) {
    el.innerHTML = `<span class="text-green-600">☁ ${syncStatus.last}</span>`;
  } else {
    el.innerHTML = '<span class="text-gray-400">☁ 미연결</span>';
  }
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (!s) return JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    // 누락된 필드를 DEFAULT_SETTINGS에서 보충
    for (const k of Object.keys(DEFAULT_SETTINGS)) if (!s[k]) s[k] = JSON.parse(JSON.stringify(DEFAULT_SETTINGS[k]));
    if (!s.departments) s.departments = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.departments));
    if (!s.trainees) s.trainees = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.trainees));
    if (!s.processes) s.processes = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.processes));
    if (!s.instructors) s.instructors = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.instructors));
    return s;
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); syncToGoogle("settings"); }

  });
  return count;
}

                <option value="">-- 부서장 선택 --</option>
                ${(() => {
                  const dept = log.instructorDept || (log.trainees && log.trainees.length > 0
                    ? (state.settings.trainees.find(t=>t.name===log.trainees[0])||{}).dept : "");
                  const deptObj = (state.settings.departments||[]).find(d=>d.name===dept);
                  const defaultMgr = deptObj ? deptObj.manager : "";
                  // 부서장 후보: 강사 마스터에서 isManager=true 또는 같은 부서 강사 모두
                  const managers = state.settings.instructors.filter(i => i.isManager || (!dept || i.dept===dept)).map(i=>i.name);

                  const selected = (log.approvers && log.approvers.manager.name) || defaultMgr;
                  return unique.map(n=>`<option value="${n}" ${selected===n?'selected':''}>${n}</option>`).join("");

      </div>

function renderStats() {
  const allDepts = (state.settings.departments||[]).map(d=>d.name);
  // 기본값: 첫 번째 부서
  if (!state.statsFilterDept && allDepts.length > 0) {
    state.statsFilterDept = allDepts[0];
  }
  const filterDept = state.statsFilterDept;

  // 인원별 교육 이력 집계 (선택 부서만)
  const summary = {};
  state.settings.trainees.filter(t => t.dept === filterDept).forEach(t => {
    summary[t.name] = { name: t.name, dept: t.dept||"", count: 0, scoreSum: 0, trainings: [], lines: new Set() };
  });

  state.logs.forEach(log => {
    const tpl = findProcess(log.processId);
    const courseName = tpl ? tpl.name : (log.courseName || "-");
    const avg = log.scores.reduce((a,b)=>a+b,0)/5;
    (log.trainees||[]).forEach(name => {
      if (!summary[name]) return; // 다른 부서 인원 무시
      summary[name].count++;
      summary[name].scoreSum += avg;
      summary[name].lines.add(log.line||"-");
      summary[name].trainings.push({
        line: log.line||"-",
        course: courseName,
        processId: log.processId,
        instructor: log.instructorName,
        startDate: log.startDate,
        endDate: log.endDate,
        hours: log.hours,
        avg: avg,
        scores: log.scores,
        logId: log.id
      });
    });
  });

  const people = Object.values(summary).sort((a,b)=>a.name.localeCompare(b.name));

  // 각 인원의 이수율 계산
  function getCompletion(person) {
    const dept = (state.settings.departments||[]).find(d=>d.name===person.dept);
    if (!dept || !dept.requiredProcessIds || dept.requiredProcessIds.length===0) return { required:0, done:0, rate:0 };
    const requiredSet = new Set(dept.requiredProcessIds);
    const doneSet = new Set(person.trainings.map(t=>t.processId).filter(Boolean));
    const done = [...requiredSet].filter(pid=>doneSet.has(pid)).length;
    return { required: requiredSet.size, done, rate: requiredSet.size ? done/requiredSet.size : 0 };
  }

  // 요약 카드 그리드
  const cards = people.map(p => {
    const avgScore = p.count>0 ? (p.scoreSum/p.count).toFixed(1) : "-";
    const comp = getCompletion(p);
    const rate = comp.required ? Math.round(comp.rate*100) : 0;
    const isSelected = state.selectedTrainee === p.name;
    const scoreColor = p.count===0 ? 'bg-gray-100 text-gray-500' :
                       avgScore>=4 ? 'bg-green-100 text-green-800' :
                       avgScore>=3 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800';
    const rateColor = rate===100 ? 'bg-green-500' : rate>=50 ? 'bg-blue-500' : rate>0 ? 'bg-yellow-500' : 'bg-gray-300';
    return `
      <div data-action="selectTrainee" data-name="${p.name}" class="cursor-pointer p-4 rounded-lg border-2 ${isSelected?'border-blue-600 bg-blue-50':'border-gray-200 bg-white hover:border-blue-300'} transition">
        <div class="flex items-start justify-between mb-2">
          <div>
            <div class="font-bold text-gray-800">${p.name}</div>
            <div class="text-xs text-gray-500">${p.dept||'(부서 미지정)'}</div>
          </div>
          <span class="inline-block px-2 py-1 rounded text-xs font-semibold ${scoreColor}">${avgScore}</span>
        </div>
        <div class="mb-2">
          <div class="flex justify-between text-xs mb-1">
            <span class="text-gray-500">이수율</span>
            <span class="font-semibold">${comp.done}/${comp.required}</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div class="${rateColor} h-2 rounded-full transition-all" style="width:${rate}%"></div>
          </div>
        </div>
      </div>`;
  }).join("");

  // 요약 통계
  const totalRequired = people.reduce((s,p)=>s+getCompletion(p).required, 0);
  const totalDone = people.reduce((s,p)=>s+getCompletion(p).done, 0);
  const overallRate = totalRequired ? Math.round(totalDone/totalRequired*100) : 0;

  // 선택된 인원의 상세
  let detail = "";
  if (state.selectedTrainee) {
    const person = summary[state.selectedTrainee];
    if (person) {
      const dept = (state.settings.departments||[]).find(d=>d.name===person.dept);
      const requiredIds = dept ? (dept.requiredProcessIds||[]) : [];
      const doneMap = {}; // processId -> training
      person.trainings.forEach(t => { if (t.processId) doneMap[t.processId] = t; });

      // 필수 교육 항목들을 라인별로 그룹화
      const requiredProcesses = requiredIds.map(pid => findProcess(pid)).filter(Boolean);
      const byLine = {};
      requiredProcesses.forEach(p => {
        if (!byLine[p.line]) byLine[p.line] = [];
        byLine[p.line].push(p);
      });

      const sortedLines = Object.keys(byLine).sort();
      const lineSections = sortedLines.map(line => {
        const rows = byLine[line].map(proc => {
          const training = doneMap[proc.id];
          const plan = state.plans.find(pl => pl.traineeName === person.name && pl.processId === proc.id);
          const today = new Date().toISOString().slice(0,10);

          let statusCell, dateCell, actionCell;
          if (training) {
            // 완료
            statusCell = `<span class="inline-block px-2 py-1 rounded text-xs bg-green-100 text-green-800 font-semibold">✅ 완료</span>`;
            dateCell = `<div class="text-xs">${training.startDate}<br>~ ${training.endDate}</div>`;
            actionCell = `
              <span class="inline-block px-2 py-0.5 rounded text-xs ${training.avg>=4?'bg-green-100 text-green-800':training.avg>=3?'bg-yellow-100 text-yellow-800':'bg-red-100 text-red-800'}">${training.avg.toFixed(1)}점</span>
              <button data-action="print" data-id="${training.logId}" class="text-green-600 hover:underline text-xs ml-2">출력</button>`;
          } else if (plan) {
            // 계획됨
            const overdue = plan.plannedDate < today;
            statusCell = overdue
              ? `<span class="inline-block px-2 py-1 rounded text-xs bg-red-100 text-red-800 font-semibold">⚠️ 기한초과</span>`
              : `<span class="inline-block px-2 py-1 rounded text-xs bg-blue-100 text-blue-800 font-semibold">📅 계획됨</span>`;
            dateCell = `<input type="date" value="${plan.plannedDate}" data-action="updatePlan" data-trainee="${person.name}" data-pid="${proc.id}" class="plan-date-input border rounded px-2 py-1 text-xs">`;
            actionCell = `
              <button data-action="startLogFromPlan" data-trainee="${person.name}" data-pid="${proc.id}" class="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs font-semibold">✏️ 일지 작성</button>
              <button data-action="delPlan" data-trainee="${person.name}" data-pid="${proc.id}" class="text-red-600 hover:underline text-xs ml-2">삭제</button>`;
          } else {
            // 미계획
            statusCell = `<span class="inline-block px-2 py-1 rounded text-xs bg-gray-100 text-gray-600">미계획</span>`;
            dateCell = `<input type="date" data-action="addPlan" data-trainee="${person.name}" data-pid="${proc.id}" class="plan-date-input border rounded px-2 py-1 text-xs" placeholder="계획일 입력">`;
            actionCell = `<button data-action="startLogFromPlan" data-trainee="${person.name}" data-pid="${proc.id}" class="text-xs text-blue-600 hover:underline">✏️ 바로 일지 작성</button>`;
          }

          return `
            <tr class="border-b hover:bg-gray-50">
              <td class="p-2 font-medium">${proc.name}</td>
              <td class="p-2">${statusCell}</td>
              <td class="p-2">${dateCell}</td>
              <td class="p-2">${actionCell}</td>
            </tr>`;
        }).join("");

        const lineDone = byLine[line].filter(p=>doneMap[p.id]).length;
        return `
          <div class="mb-4">
            <h4 class="font-bold text-blue-700 mb-2 bg-blue-50 px-3 py-2 rounded flex justify-between items-center">
              <span>🏭 ${line}</span>
              <span class="text-sm">${lineDone} / ${byLine[line].length} 완료</span>
            </h4>
            <table class="w-full text-sm border">
              <thead class="bg-gray-100">
                <tr>
                  <th class="p-2 text-left">공정</th>
                  <th class="p-2 text-left w-28">상태</th>
                  <th class="p-2 text-left w-40">계획일 / 교육일</th>
                  <th class="p-2 text-left">점수 / 작업</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }).join("");

      // 부서 외 추가 교육
      const extraTrainings = person.trainings.filter(t => !t.processId || !requiredIds.includes(t.processId));
      const extraHtml = extraTrainings.length > 0 ? `
        <div class="mt-4">
          <h4 class="font-bold text-gray-700 mb-2 bg-gray-50 px-3 py-2 rounded">📎 부서 필수 외 교육 (${extraTrainings.length}건)</h4>
          <table class="w-full text-sm border">
            <thead class="bg-gray-100"><tr><th class="p-2 text-left">라인</th><th class="p-2 text-left">교육</th><th class="p-2 text-left">기간</th><th class="p-2 text-center">점수</th></tr></thead>
            <tbody>
              ${extraTrainings.map(t=>`
                <tr class="border-b"><td class="p-2">${t.line}</td><td class="p-2">${t.course}</td><td class="p-2 text-xs">${t.startDate}~${t.endDate}</td><td class="p-2 text-center">${t.avg.toFixed(1)}</td></tr>
              `).join("")}
            </tbody>
          </table>
        </div>` : "";

      const deptInfo = dept
        ? `${person.dept} · 필수 교육 ${requiredIds.length}개 중 ${requiredIds.filter(id=>doneMap[id]).length}개 완료`
        : `${person.dept||'부서 미지정'} · 필수 교육 설정 없음`;

      detail = `
        <div class="mt-6 bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-600">
          <div class="flex justify-between items-center mb-4 pb-3 border-b">
            <div>
              <h3 class="text-xl font-bold">👤 ${person.name}</h3>
              <p class="text-sm text-gray-500">${deptInfo}</p>
            </div>
            <button data-action="clearTrainee" class="text-gray-500 hover:text-gray-800 text-xl">✕</button>
          </div>
          ${requiredProcesses.length > 0 ? lineSections : '<div class="text-center text-gray-500 py-6 bg-gray-50 rounded">이 인원의 부서에는 필수 교육이 지정되지 않았습니다.<br><span class="text-xs">설정 → 부서 관리에서 필수 공정을 지정하세요.</span></div>'}
          ${extraHtml}
        </div>`;
    }
  }

  const deptTabs = `
    <div class="flex gap-1 mb-3">
      ${allDepts.map(d => `
        <button data-action="setStatsDept" data-dept="${d}" class="px-4 py-2 rounded-t-lg font-semibold text-sm ${filterDept===d?'bg-blue-600 text-white shadow':'bg-gray-200 text-gray-700 hover:bg-gray-300'}">${d}</button>
      `).join("")}
    </div>`;

  return `
  <div class="max-w-7xl mx-auto p-6">
    ${navBar('stats')}
    ${deptTabs}
    <div class="bg-white rounded-xl shadow-lg p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">📊 ${filterDept} 인원별 교육 현황</h1>
          <p class="text-sm text-gray-500 mt-1">부서별 필수 교육 이수 현황 · 카드를 클릭하면 상세 내역과 계획 일정 입력 가능</p>
        </div>
        <button data-action="exportStats" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">CSV 내보내기</button>
      </div>
      <div class="grid grid-cols-4 gap-3">
        <div class="bg-blue-50 p-3 rounded"><div class="text-xs text-gray-600">등록 인원</div><div class="text-2xl font-bold text-blue-700">${people.length}</div></div>
        <div class="bg-green-50 p-3 rounded"><div class="text-xs text-gray-600">전체 이수율</div><div class="text-2xl font-bold text-green-700">${overallRate}%</div></div>
        <div class="bg-purple-50 p-3 rounded"><div class="text-xs text-gray-600">완료 교육</div><div class="text-2xl font-bold text-purple-700">${totalDone} / ${totalRequired}</div></div>
        <div class="bg-orange-50 p-3 rounded"><div class="text-xs text-gray-600">계획된 교육</div><div class="text-2xl font-bold text-orange-700">${state.plans.length}</div></div>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-3">
      ${cards || '<div class="col-span-4 text-center text-gray-500 py-8 bg-white rounded-xl">등록된 피교육자가 없습니다.</div>'}
    </div>

    ${detail}
  </div>`;
}



function renderSchedule() {
  const allDepts = (state.settings.departments||[]).map(d=>d.name);
  if (!state.scheduleFilterDept && allDepts.length > 0) {
    state.scheduleFilterDept = allDepts[0];
  }
  const today = new Date().toISOString().slice(0,10);
  const filterMode = state.scheduleFilter || "all";
  const filterDept = state.scheduleFilterDept;

  // 모든 계획을 수집 + 완료된 교육도 합침
  const items = [];

  // 1) plans 에 등록된 항목
  state.plans.forEach(plan => {
    const trainee = state.settings.trainees.find(t=>t.name===plan.traineeName);
    const proc = findProcess(plan.processId);
    // 완료 여부: 해당 인원이 해당 공정 교육일지에 포함되어 있는지
    const completedLog = state.logs.find(l => l.processId===plan.processId && (l.trainees||[]).includes(plan.traineeName));
    items.push({
      traineeName: plan.traineeName,
      dept: trainee ? trainee.dept : "",
      processId: plan.processId,
      processName: proc ? proc.name : "(삭제된 공정)",
      line: proc ? proc.line : "-",
      plannedDate: plan.plannedDate,
      status: completedLog ? "done" : (plan.plannedDate < today ? "overdue" : "pending"),
      completedLog: completedLog || null,
      source: "plan"
    });
  });

  // 2) 계획 없이 완료된 교육도 추가 (완료 기록 추적용)
  state.logs.forEach(log => {
    (log.trainees||[]).forEach(name => {
      const exists = items.find(it => it.traineeName===name && it.processId===log.processId);
      if (!exists && log.processId) {
        const trainee = state.settings.trainees.find(t=>t.name===name);
        const proc = findProcess(log.processId);
        items.push({
          traineeName: name,
          dept: trainee ? trainee.dept : "",
          processId: log.processId,
          processName: proc ? proc.name : (log.courseName||"-"),
          line: log.line || (proc ? proc.line : "-"),
          plannedDate: log.startDate,
          status: "done",
          completedLog: log,
          source: "log"
        });
      }
    });
  });

  // 필터링
  let filtered = items;
  if (filterMode === "pending") filtered = filtered.filter(i => i.status === "pending");
  else if (filterMode === "overdue") filtered = filtered.filter(i => i.status === "overdue");
  else if (filterMode === "done") filtered = filtered.filter(i => i.status === "done");
  else if (filterMode === "month") {
    const thisMonth = today.slice(0,7);
    filtered = filtered.filter(i => i.plannedDate.startsWith(thisMonth));
  }
  if (filterDept) filtered = filtered.filter(i => i.dept === filterDept);

  // 정렬: 기한초과 → 계획됨(날짜 오름차순) → 완료(날짜 내림차순)
  const statusOrder = { overdue: 0, pending: 1, done: 2 };
  filtered.sort((a,b) => {
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    if (a.status === "done") return b.plannedDate.localeCompare(a.plannedDate);
    return a.plannedDate.localeCompare(b.plannedDate);
  });

  // 통계
  const total = items.length;
  const pendingCount = items.filter(i=>i.status==="pending").length;
  const overdueCount = items.filter(i=>i.status==="overdue").length;
  const doneCount = items.filter(i=>i.status==="done").length;

  const statusBadge = (s) => {
    if (s === "done") return `<span class="inline-block px-2 py-1 rounded text-xs bg-green-100 text-green-800 font-semibold">✅ 완료</span>`;
    if (s === "overdue") return `<span class="inline-block px-2 py-1 rounded text-xs bg-red-100 text-red-800 font-semibold">⚠️ 기한초과</span>`;
    return `<span class="inline-block px-2 py-1 rounded text-xs bg-blue-100 text-blue-800 font-semibold">📅 계획됨</span>`;
  };

  const rows = filtered.map((it, idx) => {
    const daysFromToday = Math.ceil((new Date(it.plannedDate) - new Date(today)) / (1000*60*60*24));
    let dayInfo = "";
    if (it.status === "pending") dayInfo = `<span class="text-xs text-blue-600">D-${daysFromToday}</span>`;
    else if (it.status === "overdue") dayInfo = `<span class="text-xs text-red-600">${-daysFromToday}일 경과</span>`;

    const actionCell = it.status === "done"
      ? `<button data-action="print" data-id="${it.completedLog.id}" class="text-green-600 hover:underline text-xs">일지 출력</button>`
      : it.source === "plan"
        ? `<button data-action="delPlanFromSchedule" data-trainee="${it.traineeName}" data-pid="${it.processId}" class="text-red-600 hover:underline text-xs">계획 삭제</button>`
        : "";

    const dateCell = it.source === "plan" && it.status !== "done"
      ? `<input type="date" value="${it.plannedDate}" data-action="updatePlanFromSchedule" data-trainee="${it.traineeName}" data-pid="${it.processId}" class="plan-date-input border rounded px-2 py-1 text-xs">`
      : `<span class="text-sm">${it.plannedDate}</span>`;

    // 교육과정명 셀: 계획됨/기한초과 → 클릭 시 교육일지 작성으로 / 완료 → 일지 보기로
    const courseCell = it.status === "done"
      ? `<div class="text-xs text-gray-500">${it.line}</div>
         <div class="font-medium cursor-pointer text-green-700 hover:underline" data-action="print" data-id="${it.completedLog.id}" title="교육일지 보기">${it.processName}</div>`
      : `<div class="text-xs text-gray-500">${it.line}</div>
         <div class="font-medium cursor-pointer text-blue-700 hover:underline" data-action="startLogFromPlan" data-trainee="${it.traineeName}" data-pid="${it.processId}" title="이 교육의 일지 작성하기 →">${it.processName} ✏️</div>`;

    return `
      <tr class="border-b hover:bg-blue-50">
        <td class="p-2 text-center text-gray-500">${idx+1}</td>
        <td class="p-2">${statusBadge(it.status)}</td>
        <td class="p-2">
          <div class="font-semibold cursor-pointer text-blue-700 hover:underline" data-action="selectTraineeFromSchedule" data-name="${it.traineeName}">${it.traineeName}</div>
          <div class="text-xs text-gray-500">${it.dept}</div>
        </td>
        <td class="p-2">${courseCell}</td>
        <td class="p-2">${dateCell}</td>
        <td class="p-2">${dayInfo}</td>
        <td class="p-2 text-right">${actionCell}</td>
      </tr>`;
  }).join("");

  // 일괄 계획 등록 - 현재 선택 부서만
  const unplannedCount = state.settings.trainees.filter(t=>t.dept===filterDept).reduce((sum, t) => {
    const dept = (state.settings.departments||[]).find(d=>d.name===t.dept);
    if (!dept) return sum;
    const required = dept.requiredProcessIds||[];
    const planned = new Set(state.plans.filter(p=>p.traineeName===t.name).map(p=>p.processId));
    const done = new Set(state.logs.filter(l=>(l.trainees||[]).includes(t.name)).map(l=>l.processId));
    return sum + required.filter(pid => !planned.has(pid) && !done.has(pid)).length;
  }, 0);

  const deptTabs = `
    <div class="flex gap-1 mb-3">
      ${allDepts.map(d => `
        <button data-action="setScheduleDept" data-dept="${d}" class="px-4 py-2 rounded-t-lg font-semibold text-sm ${filterDept===d?'bg-blue-600 text-white shadow':'bg-gray-200 text-gray-700 hover:bg-gray-300'}">${d}</button>
      `).join("")}
    </div>`;

  return `
  <div class="max-w-7xl mx-auto p-6">
    ${navBar('schedule')}
    ${deptTabs}
    <div class="bg-white rounded-xl shadow-lg p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">📅 ${filterDept} 교육 일정 현황</h1>
          <p class="text-sm text-gray-500 mt-1">계획된 교육 · 기한 관리 · 완료 이력</p>
        </div>
        <div class="flex gap-2">
          ${unplannedCount > 0 ? `<button data-action="bulkPlanAll" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg text-sm">⚡ 일괄 계획 등록 (${unplannedCount}건)</button>` : ''}
          <button data-action="exportSchedule" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm">CSV 내보내기</button>
        </div>
      </div>
      <div class="grid grid-cols-4 gap-3 mb-4">
        <div class="bg-blue-50 p-3 rounded"><div class="text-xs text-gray-600">전체 일정</div><div class="text-2xl font-bold text-blue-700">${total}</div></div>
        <div class="bg-yellow-50 p-3 rounded"><div class="text-xs text-gray-600">예정</div><div class="text-2xl font-bold text-yellow-700">${pendingCount}</div></div>
        <div class="bg-red-50 p-3 rounded"><div class="text-xs text-gray-600">기한초과</div><div class="text-2xl font-bold text-red-700">${overdueCount}</div></div>
        <div class="bg-green-50 p-3 rounded"><div class="text-xs text-gray-600">완료</div><div class="text-2xl font-bold text-green-700">${doneCount}</div></div>
      </div>
      <div class="flex gap-2 items-center flex-wrap">
        <span class="text-sm font-semibold text-gray-600">필터:</span>
        <button data-action="schFilter" data-mode="all" class="px-3 py-1 rounded text-sm ${filterMode==='all'?'bg-blue-600 text-white':'bg-gray-100'}">전체</button>
        <button data-action="schFilter" data-mode="pending" class="px-3 py-1 rounded text-sm ${filterMode==='pending'?'bg-blue-600 text-white':'bg-gray-100'}">예정</button>
        <button data-action="schFilter" data-mode="overdue" class="px-3 py-1 rounded text-sm ${filterMode==='overdue'?'bg-blue-600 text-white':'bg-gray-100'}">기한초과</button>
        <button data-action="schFilter" data-mode="done" class="px-3 py-1 rounded text-sm ${filterMode==='done'?'bg-blue-600 text-white':'bg-gray-100'}">완료</button>
        <button data-action="schFilter" data-mode="month" class="px-3 py-1 rounded text-sm ${filterMode==='month'?'bg-blue-600 text-white':'bg-gray-100'}">이번 달</button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-100 border-b-2">
          <tr>
            <th class="p-3 w-12">#</th>
            <th class="p-3 text-left w-28">상태</th>
            <th class="p-3 text-left">피교육자</th>
            <th class="p-3 text-left">교육과정</th>
            <th class="p-3 text-left w-40">계획일 / 교육일</th>
            <th class="p-3 text-left w-24">D-day</th>
            <th class="p-3 text-right w-28">작업</th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="7" class="text-center py-8 text-gray-500">해당 조건의 일정이 없습니다.</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

// 스킬 레벨 자동 판정 (교육일지 + 강사 마스터 기반)
// 스킬 레벨 자동 판정 (회사 기준표 그대로)
// 교육일지 5개 항목 점수 → 100점 환산 → 회사 기준표 매핑
// 21~40 = 1, 41~60 = 2, 61~80 = 3, 81~100 = 4
function getSkillLevel(traineeName, processId) {
  const matchingLogs = state.logs.filter(l =>
    l.processId === processId && (l.trainees||[]).includes(traineeName)
  );
  if (matchingLogs.length === 0) return { level: 0, score100: null, lastDate: null, logs: [] };

  // 각 일지 → 100점 환산: (5개 항목 합 / 25) × 100
  // 여러 일지가 있으면 최고 점수 채택 (재교육으로 향상된 결과 반영)
  const scores100 = matchingLogs.map(l => (l.scores.reduce((a,b)=>a+b,0) / 25) * 100);
  const score100 = Math.max(...scores100);
  const lastDate = matchingLogs.map(l=>l.startDate).sort().reverse()[0];

  let level = 0;
  if (score100 >= 81) level = 4;
  else if (score100 >= 61) level = 3;
  else if (score100 >= 41) level = 2;
  else if (score100 >= 21) level = 1;

  return { level, score100, lastDate, logs: matchingLogs };
}

// 회사 기준표 그대로 - 라벨 없이 숫자만, 능력 설명문은 회사 원본
const SKILL_DESC = {
  0: "미교육",
  1: "작업 표준서 또는 도움을 받아서 작업할 수 있는 능력",
  2: "작업 표준 또는 도움 없이 작업할 수 있는 능력",
  3: "작업 표준에 준하여 표준작업 속도를 만족시킬 수 있는 능력",
  4: "작업 외 설비/품질특성을 관리할 수 있는 능력"
};

const SKILL_RANGE = {
  0: "0~20",
  1: "21~40",
  2: "41~60",
  3: "61~80",
  4: "81~100"
};

const SKILL_COLORS = {
  0: { bg: "bg-gray-100", text: "text-gray-400", hex: "#f3f4f6" },
  1: { bg: "bg-yellow-200", text: "text-yellow-900", hex: "#fef08a" },
  2: { bg: "bg-lime-300", text: "text-lime-900", hex: "#bef264" },
  3: { bg: "bg-green-500", text: "text-white", hex: "#22c55e" },
  4: { bg: "bg-emerald-700", text: "text-white", hex: "#047857" }
};

function renderSkill() {
  const allDepts = (state.settings.departments||[]).map(d=>d.name);
  // 기본값: 첫 번째 부서 선택
  if (!state.skillFilterDept && allDepts.length > 0) {
    state.skillFilterDept = allDepts[0];
  }
  const filterDept = state.skillFilterDept;
  const filterLine = state.skillFilterLine || "";

  // 부서 설정에서 필수 공정 ID 가져오기
  const deptObj = (state.settings.departments||[]).find(d=>d.name===filterDept);
  const deptProcessIds = deptObj ? (deptObj.requiredProcessIds||[]) : [];

  // 필터링된 인원 (열) - 선택 부서 소속만
  let trainees = state.settings.trainees.filter(t => t.dept === filterDept);

  // 필터링된 공정 (행) - 선택 부서의 필수 공정만
  let processes = state.settings.processes.filter(p => deptProcessIds.includes(p.id));
  if (filterLine) processes = processes.filter(p => p.line === filterLine);

  // 매트릭스 데이터 계산: rows = processes, cols = trainees
  const matrix = processes.map(p => {
    const row = { process: p, cells: [] };
    const lvCounts = [0,0,0,0,0];
    trainees.forEach(t => {
      const skill = getSkillLevel(t.name, p.id);
      row.cells.push({ trainee: t, skill });
      lvCounts[skill.level]++;
    });
    row.lvCounts = lvCounts;
    row.trained = trainees.length - lvCounts[0];
    row.coverage = trainees.length > 0 ? (row.trained/trainees.length*100) : 0;
    return row;
  });

  // 인원별 평균 통계 (하단 푸터용)
  const personStats = trainees.map((t, i) => {
    let sum = 0, count = 0;
    matrix.forEach(row => {
      const lv = row.cells[i].skill.level;
      if (lv > 0) { sum += lv; count++; }
    });
    return {
      trainee: t,
      avg: count > 0 ? sum/count : 0,
      coverage: processes.length > 0 ? (count/processes.length*100) : 0,
      trained: count
    };
  });

  // 라인별 그룹화 (행 헤더 그룹)
  const lineGroups = [];
  let currentLine = null;
  matrix.forEach((row, idx) => {
    if (row.process.line !== currentLine) {
      lineGroups.push({ line: row.process.line, rows: [{ row, idx }] });
      currentLine = row.process.line;
    } else {
      lineGroups[lineGroups.length-1].rows.push({ row, idx });
    }
  });

  // 셀 렌더링
  const cellHtml = (cell, processName) => {
    const c = SKILL_COLORS[cell.skill.level];
    const tooltip = cell.skill.level > 0
      ? `${cell.trainee.name} · ${processName}\nLv ${cell.skill.level} · ${cell.skill.score100.toFixed(0)}점 (${SKILL_RANGE[cell.skill.level]})\n${SKILL_DESC[cell.skill.level]}\n최종 ${cell.skill.lastDate}`
      : `${cell.trainee.name} · ${processName}\n미교육`;
    const handler = cell.skill.logs.length > 0
      ? `data-action="openSkillLog" data-logid="${cell.skill.logs[0].id}"`
      : "";
    return `<td class="${c.bg} ${c.text} text-center font-bold cursor-pointer hover:opacity-80 border border-white" style="width:60px;height:32px;font-size:12px;" title="${tooltip}" ${handler}>${cell.skill.level || ''}</td>`;
  };

  // 헤더: 사진 + 이름 + 입사일
  // 각 행마다 sticky top 위치를 누적 (60 + 90 + ...)
  const photoHeaderRow = `
    <tr>
      <th class="border border-gray-300 p-1" colspan="2" style="font-size:11px;background:#e5e7eb;position:sticky;top:0;left:0;z-index:35;">사진</th>
      ${trainees.map(t => `<th class="border border-gray-300 p-0.5" style="width:60px;height:60px;background:#ffffff;position:sticky;top:0;z-index:25;">
        ${t.photo
          ? `<img src="${t.photo}" alt="${t.name}" style="width:54px;height:54px;object-fit:cover;border-radius:4px;display:block;margin:auto;">`
          : `<div style="width:54px;height:54px;background:#e5e7eb;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#9ca3af;margin:auto;">👤</div>`}
      </th>`).join("")}
      <th class="border border-gray-300" style="background:#e5e7eb;position:sticky;top:0;z-index:25;"></th>
    </tr>`;
  const traineeHeaderRow = `
    <tr>
      <th class="border border-gray-300 p-2" style="min-width:60px;background:#e5e7eb;position:sticky;top:60px;left:0;z-index:35;">라인</th>
      <th class="border border-gray-300 p-2" style="left:60px;min-width:200px;background:#e5e7eb;position:sticky;top:60px;z-index:35;">공정명</th>
      ${trainees.map(t => `<th class="border border-gray-300 p-1" style="width:60px;height:90px;background:#f3f4f6;position:sticky;top:60px;z-index:25;"><div style="writing-mode:vertical-lr;font-size:12px;font-weight:700;white-space:nowrap;margin:auto;">${t.name}</div></th>`).join("")}
      <th class="border border-gray-300 p-2" style="min-width:100px;background:#e5e7eb;position:sticky;top:60px;z-index:25;">이수율</th>
    </tr>`;
  const joinDateHeaderRow = `
    <tr>
      <th class="border border-gray-300 p-1" colspan="2" style="font-size:11px;background:#f3f4f6;position:sticky;top:150px;left:0;z-index:35;">입사일</th>
      ${trainees.map(t => `<th class="border border-gray-300 text-center" style="font-size:9px;color:#374151;font-weight:500;background:#f9fafb;position:sticky;top:150px;z-index:25;">${t.joinDate||'-'}</th>`).join("")}
      <th class="border border-gray-300" style="background:#f3f4f6;position:sticky;top:150px;z-index:25;"></th>
    </tr>`;

  // 행 렌더링: 라인별로 그룹화 + 셀
  const lineRowsHtml = lineGroups.map(group => {
    const rows = group.rows.map((item, gi) => {
      const row = item.row;
      const covColor = row.coverage >= 80 ? 'bg-green-500' : row.coverage >= 50 ? 'bg-blue-500' : row.coverage > 0 ? 'bg-yellow-500' : 'bg-gray-300';
      const lineCell = gi === 0
        ? `<td class="border border-gray-300 text-blue-900 font-bold text-center" rowspan="${group.rows.length}" style="font-size:12px;writing-mode:vertical-lr;background:#dbeafe;position:sticky;left:0;z-index:15;min-width:60px;">${group.line}</td>`
        : "";
      return `
        <tr>
          ${lineCell}
          <td class="border border-gray-300 p-2 text-xs font-semibold" style="left:60px;background:#ffffff;position:sticky;z-index:15;min-width:200px;">${row.process.name}</td>
          ${row.cells.map(c => cellHtml(c, row.process.name)).join("")}
          <td class="border border-gray-300 p-1 text-center" style="background:#ffffff;">
            <div class="text-xs mb-0.5">${row.trained}/${trainees.length}</div>
            <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="${covColor} h-1.5 rounded-full" style="width:${row.coverage}%"></div></div>
          </td>
        </tr>`;
    }).join("");
    return rows;
  }).join("");

  // 푸터: 회사 양식 그대로 - 총 수, 획득 수, 획득율, 전년/목표
  // 인원별로 [총 공정 수, 획득(Lv≥1) 수, 획득율]
  const totalProc = processes.length;
  const totalDiagrams = trainees.length * totalProc;
  const totalEarned = personStats.reduce((s,ps)=>s+ps.trained,0);
  const totalRate = totalDiagrams ? (totalEarned/totalDiagrams*100).toFixed(1) : "0";

  const footerRows = `
    <tr>
      <td class="border border-gray-300 p-1 text-xs font-bold text-center" colspan="2" style="background:#d1d5db;position:sticky;left:0;z-index:15;">개인 평균 Lv</td>
      ${personStats.map(ps => {
        const cls = ps.avg >= 3 ? 'bg-green-200 text-green-900' : ps.avg >= 2 ? 'bg-lime-200 text-lime-900' : ps.avg >= 1 ? 'bg-yellow-200 text-yellow-900' : 'bg-gray-100 text-gray-500';
        return `<td class="border border-gray-300 text-center text-xs font-bold ${cls}">${ps.avg.toFixed(1)}</td>`;
      }).join("")}
      <td class="border border-gray-300" style="background:#f3f4f6;"></td>
    </tr>
    <tr>
      <td class="border border-gray-300 p-1 text-xs font-bold text-center" colspan="2" style="background:#e5e7eb;position:sticky;left:0;z-index:15;">총 Diagram 수</td>
      ${personStats.map(()=>`<td class="border border-gray-300 text-center text-xs" style="background:#ffffff;">${totalProc}</td>`).join("")}
      <td class="border border-gray-300 text-center text-xs font-bold" style="background:#f3f4f6;">${totalDiagrams}</td>
    </tr>
    <tr>
      <td class="border border-gray-300 p-1 text-xs font-bold text-center" colspan="2" style="background:#e5e7eb;position:sticky;left:0;z-index:15;">획득 Diagram 수</td>
      ${personStats.map(ps=>`<td class="border border-gray-300 text-center text-xs font-semibold" style="background:#ffffff;">${ps.trained}</td>`).join("")}
      <td class="border border-gray-300 text-center text-xs font-bold" style="background:#f3f4f6;">${totalEarned}</td>
    </tr>
    <tr>
      <td class="border border-gray-300 p-1 text-xs font-bold text-center" colspan="2" style="background:#e5e7eb;position:sticky;left:0;z-index:15;">Skill Diagram 획득율 %</td>
      ${personStats.map(ps=>{
        const r = ps.coverage;
        const cls = r>=80?'bg-green-100 text-green-800':r>=50?'bg-blue-100 text-blue-800':r>0?'bg-yellow-100 text-yellow-800':'bg-gray-100 text-gray-500';
        return `<td class="border border-gray-300 text-center text-xs font-bold ${cls}">${r.toFixed(0)}%</td>`;
      }).join("")}
      <td class="border border-gray-300 text-center text-xs font-bold" style="background:#dbeafe;color:#1e40af;">${totalRate}%</td>
    </tr>`;

  // 갭 분석 - 다음 레벨 승급 후보 (각 레벨 임계값에 가까운 점수)
  const lowSkillPeople = personStats.filter(ps => ps.coverage < 50 && ps.trainee.dept).sort((a,b) => a.coverage - b.coverage).slice(0, 8);
  const promotionCandidates = [];
  matrix.forEach(row => {
    row.cells.forEach(c => {
      if (c.skill.level > 0 && c.skill.level < 4 && c.skill.score100 != null) {
        // 다음 레벨까지 10점 이내면 후보
        const nextThreshold = c.skill.level === 1 ? 41 : c.skill.level === 2 ? 61 : 81;
        if (nextThreshold - c.skill.score100 <= 10 && nextThreshold - c.skill.score100 > 0) {
          promotionCandidates.push({
            name: c.trainee.name,
            process: row.process.name,
            score: c.skill.score100,
            currentLv: c.skill.level,
            nextLv: c.skill.level + 1
          });
        }
      }
    });
  });
  promotionCandidates.sort((a,b) => b.score - a.score);

  const deptTabs = `
    <div class="flex gap-1 mb-3">
      ${allDepts.map(d => `
        <button data-action="setSkillDept" data-dept="${d}" class="px-4 py-2 rounded-t-lg font-semibold text-sm ${filterDept===d?'bg-blue-600 text-white shadow':'bg-gray-200 text-gray-700 hover:bg-gray-300'}">${d}</button>
      `).join("")}
    </div>`;
  // 해당 부서에 속한 라인만 필터 드롭다운에 표시
  const deptLines = [...new Set(state.settings.processes.filter(p => deptProcessIds.includes(p.id)).map(p => p.line))];
  const lineOpts = deptLines.map(l => `<option value="${l}" ${filterLine===l?'selected':''}>${l}</option>`).join("");

  return `
  <div class="max-w-full mx-auto p-6">
    ${navBar('skill')}
    ${deptTabs}
    <div class="bg-white rounded-xl shadow-lg p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">🎯 ${filterDept || '전체'} 스킬맵 (Skill Matrix)</h1>
          <p class="text-sm text-gray-500 mt-1">교육일지 5개 항목 점수를 100점으로 환산하여 자동 산출 · 셀 호버 시 상세 점수</p>
        </div>
        <div class="flex gap-2">
          <select id="skillLineFilter" class="border rounded px-2 py-1 text-sm">
            <option value="">전체 라인</option>${lineOpts}
          </select>
          <button data-action="exportSkill" class="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1 rounded text-sm">CSV</button>
        </div>
      </div>
      <div class="flex gap-3 items-center text-xs bg-gray-50 p-3 rounded mb-2 flex-wrap">
        <span class="font-semibold text-gray-600">레벨:</span>
        ${[0,1,2,3,4].map(lv => {
          const c = SKILL_COLORS[lv];
          return `<div class="flex items-center gap-1.5"><span class="inline-block w-5 h-5 ${c.bg} ${c.text} text-center rounded text-xs font-bold leading-5">${lv}</span><span class="text-gray-500">${SKILL_RANGE[lv]}점</span></div>`;
        }).join("")}
        <span class="text-gray-400 ml-2">· 자세한 능력 기준은 아래 기준표 참고</span>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-4">
      <!-- 매트릭스 -->
      <div class="col-span-3 bg-white rounded-xl shadow-lg p-4 overflow-x-auto" style="max-height:80vh;overflow-y:auto;">
        ${trainees.length === 0 || processes.length === 0
          ? '<div class="text-center text-gray-500 py-12">표시할 데이터가 없습니다.</div>'
          : `<table class="border-collapse" style="border-spacing:0;">
              <thead>${photoHeaderRow}${traineeHeaderRow}${joinDateHeaderRow}</thead>
              <tbody>${lineRowsHtml}${footerRows}</tbody>
            </table>`}
      </div>

      <!-- 갭 분석 -->
      <div class="col-span-1 space-y-4">
        <div class="bg-white rounded-xl shadow-lg p-4">
          <h3 class="font-bold text-blue-700 mb-3">⬆️ 승급 후보</h3>
          <p class="text-xs text-gray-500 mb-2">다음 레벨까지 10점 이내</p>
          ${promotionCandidates.length === 0
            ? '<div class="text-xs text-gray-500 text-center py-3">없음</div>'
            : promotionCandidates.slice(0,8).map(p => `
              <div class="flex justify-between items-center text-xs py-1.5 border-b last:border-b-0">
                <div><b>${p.name}</b> <span class="text-gray-500">· ${p.process}</span><div class="text-gray-400">Lv${p.currentLv} → Lv${p.nextLv}</div></div>

function renderApprovals() {
  // 모든 일지를 결재 상태별로 분류
  const pending = [];   // 대기 (담당자 또는 부서장 미승인)
  const completed = []; // 완료

  state.logs.forEach(log => {
    const a = log.approvers;
    if (!a) return; // 결재라인 없는 옛 일지는 제외
    if (a.instructor.approved && a.manager.approved) completed.push(log);
    else pending.push(log);
  });

  // 대기는 최신순으로
  pending.sort((a,b) => (b.startDate||"").localeCompare(a.startDate||""));
  completed.sort((a,b) => (b.startDate||"").localeCompare(a.startDate||""));

  const renderItem = (log) => {
    const tpl = findProcess(log.processId);
    const courseName = tpl ? tpl.name : (log.courseName||'-');
    const traineeNames = (log.trainees||[]).join(", ");
    const a = log.approvers;

    // 단계 상태
    const instApproved = a.instructor.approved;
    const mgrApproved = a.manager.approved;
    const allDone = instApproved && mgrApproved;

    const stepBadge = (label, name, ok, approvedAt) => {
      const dateStr = approvedAt ? `<div style="font-size:9px;color:#16a34a;">${approvedAt.slice(0,10)}</div>` : '';
      return ok
        ? `<div class="bg-green-50 border border-green-300 rounded px-3 py-2 text-center"><div class="text-xs text-gray-500">${label}</div><div class="font-bold text-green-700">${name||'-'} ✓</div>${dateStr}</div>`
        : `<div class="bg-gray-50 border border-gray-300 rounded px-3 py-2 text-center"><div class="text-xs text-gray-500">${label}</div><div class="font-bold text-gray-400">${name||'(미지정)'}</div><div style="font-size:9px;color:#9ca3af;">대기</div></div>`;
    };

    // 승인 버튼 (다음 가능한 단계만 활성)
    let approveBtn = '';
    if (!instApproved && a.instructor.name) {
      approveBtn = `<button data-action="approveStep" data-id="${log.id}" data-step="instructor" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-semibold text-sm">담당자 (${a.instructor.name}) 승인</button>`;
    } else if (!mgrApproved && a.manager.name && instApproved) {
      approveBtn = `<button data-action="approveStep" data-id="${log.id}" data-step="manager" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-semibold text-sm">부서장 (${a.manager.name}) 승인</button>`;
    } else if (!a.manager.name && instApproved) {
      approveBtn = `<span class="text-xs text-orange-600">⚠ 부서장 미지정 - 일지 편집에서 지정하세요</span>`;
    } else if (!a.instructor.name) {
      approveBtn = `<span class="text-xs text-orange-600">⚠ 담당자 미지정</span>`;
    }

    return `
      <div class="bg-white rounded-lg shadow border-l-4 ${allDone?'border-green-500':'border-blue-500'} p-4 mb-3">
        <div class="flex justify-between items-start mb-3">
          <div class="flex-1">
            <div class="text-xs text-gray-500">${log.line||'-'} · ${log.startDate||'-'}</div>
            <div class="font-bold text-gray-800 text-lg">${courseName}</div>
            <div class="text-xs text-gray-500 mt-1">피교육자: ${traineeNames||'-'}</div>
          </div>
          <button data-action="print" data-id="${log.id}" class="text-blue-600 hover:underline text-sm">📄 일지 보기</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-3">
          ${stepBadge("담당자", a.instructor.name, instApproved, a.instructor.approvedAt)}
          ${stepBadge("부서장", a.manager.name, mgrApproved, a.manager.approvedAt)}
        </div>
        ${approveBtn ? `<div class="flex justify-end">${approveBtn}</div>` : ''}
      </div>`;
  };

  return `
  <div class="max-w-5xl mx-auto p-6">
    ${navBar('approvals')}
    <div class="bg-white rounded-xl shadow-lg p-6 mb-4">
      <h1 class="text-2xl font-bold text-gray-800">📝 결재함</h1>
      <p class="text-sm text-gray-500 mt-1">결재 순서: 담당자 (강사) → 부서장 · 승인된 결재는 출력 화면 서명란에 자동 표시됩니다</p>
      <div class="grid grid-cols-2 gap-3 mt-4">
        <div class="bg-blue-50 p-3 rounded"><div class="text-xs text-gray-600">대기</div><div class="text-2xl font-bold text-blue-700">${pending.length}</div></div>
        <div class="bg-green-50 p-3 rounded"><div class="text-xs text-gray-600">완료</div><div class="text-2xl font-bold text-green-700">${completed.length}</div></div>
      </div>
    </div>

    ${pending.length > 0 ? `
      <div class="mb-6">
        <h2 class="text-lg font-bold text-blue-700 mb-3">🔔 결재 대기 (${pending.length})</h2>
        ${pending.map(renderItem).join("")}
      </div>` : ''}

    ${completed.length > 0 ? `
      <div class="mb-6">
        <h2 class="text-lg font-bold text-green-700 mb-3">✅ 결재 완료 (${completed.length})</h2>
        ${completed.slice(0,20).map(renderItem).join("")}
        ${completed.length > 20 ? `<div class="text-xs text-gray-500 text-center">최근 20건만 표시</div>` : ''}
      </div>` : ''}

    ${pending.length===0 && completed.length===0
      ? `<div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">결재 대상 일지가 없습니다.<br><span class="text-xs">새 교육일지를 작성하면 자동으로 결재 라인이 생성됩니다.</span></div>`
      : ''}
  </div>`;
}

function renderDepartmentSettings() {
  const depts = state.settings.departments || [];
  // 라인별 공정 그룹화
  const byLine = {};
  state.settings.processes.forEach(p => {
    if (!byLine[p.line]) byLine[p.line] = [];
    byLine[p.line].push(p);
  });

  const sections = depts.map((d, di) => {
    const reqSet = new Set(d.requiredProcessIds || []);
    const lineGroups = Object.keys(byLine).sort().map(line => {
      const items = byLine[line].map(p => `
        <label class="inline-flex items-center gap-1.5 p-1.5 rounded border ${reqSet.has(p.id)?'bg-blue-100 border-blue-400':'bg-white border-gray-200'} cursor-pointer hover:bg-blue-50 text-xs">
          <input type="checkbox" class="dept-process-cb" data-didx="${di}" data-pid="${p.id}" ${reqSet.has(p.id)?'checked':''}>
          <span>${p.name}</span>
        </label>
      `).join("");
      return `
        <div class="mb-2">
          <div class="text-xs font-semibold text-blue-700 mb-1">🏭 ${line}</div>
          <div class="flex flex-wrap gap-1.5">${items}</div>
        </div>`;
    }).join("");

    // 부서장 선택 옵션 (강사 마스터에서 같은 부서 사람만)
    const mgrCandidates = state.settings.instructors.filter(i => i.dept === d.name).map(i => i.name);
    const allCandidates = [...new Set([...mgrCandidates, ...state.settings.trainees.filter(t=>t.dept===d.name).map(t=>t.name)])];
    const mgrOpts = allCandidates.map(n => `<option ${(d.manager||'')===n?'selected':''}>${n}</option>`).join("");

    return `
      <div class="border rounded-lg p-4 mb-3 bg-white">
        <div class="flex justify-between items-center mb-3 pb-2 border-b">
          <div class="flex items-center gap-3 flex-wrap">
            <input type="text" value="${d.name}" data-action="editDeptName" data-idx="${di}" class="dept-name-input text-lg font-bold border rounded px-2 py-1">
            <span class="text-sm text-gray-500">필수 교육: <b class="text-blue-700">${(d.requiredProcessIds||[]).length}</b>개</span>
            <span class="text-sm text-gray-500 border-l pl-3 ml-1">부서장:
              <select class="dept-manager-select border rounded px-2 py-1 text-sm ml-1" data-didx="${di}">
                <option value="">-- 미지정 --</option>
                ${mgrOpts}
              </select>
              <span class="text-xs text-gray-400 ml-1">(결재 3단계 기본값)</span>
            </span>
          </div>
          <button data-action="delDept" data-idx="${di}" class="text-red-600 hover:underline text-sm">부서 삭제</button>
        </div>
        ${lineGroups || '<div class="text-sm text-gray-500">등록된 공정이 없습니다.</div>'}
      </div>`;
  }).join("");

  return `
    <div class="flex justify-between items-center mb-3">
      <p class="text-sm text-gray-600">부서별로 필수 교육 공정을 지정합니다. 피교육자가 해당 부서 소속이면 여기 체크된 모든 공정 교육을 받아야 합니다.</p>
      <button data-action="addDept" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">+ 부서 추가</button>
    </div>
    ${sections || '<div class="text-center text-gray-500 py-8 border rounded">등록된 부서가 없습니다.</div>'}`;
}

function renderProcessSettings() {
  if (state.editingProcessIdx >= 0) {
    const isNew = state.editingProcessIdx >= state.settings.processes.length;
    const p = isNew ? { id:0, line:state.settings.lines[0]||"", name:"", content:"" }
                    : state.settings.processes[state.editingProcessIdx];
    const lineOpts = state.settings.lines.map(l=>`<option ${p.line===l?'selected':''}>${l}</option>`).join("");
    return `
      <div class="border rounded-lg p-4 bg-gray-50">
        <h3 class="font-semibold mb-3">${isNew?'➕ 새 공정 추가':'✏️ 공정 편집'}</h3>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-sm font-semibold mb-1">소속 라인 (= 장소)</label>
            <select id="p_line" class="w-full border rounded px-3 py-2">${lineOpts}</select>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1">공정명</label>
            <input id="p_name" value="${p.name}" class="w-full border rounded px-3 py-2">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-semibold mb-1">교육 내용</label>
            <textarea id="p_content" rows="16" class="w-full border rounded px-3 py-2 font-mono text-xs">${p.content}</textarea>
          </div>
        </div>
        <div class="flex gap-2 justify-end">
          <button data-action="cancelProcess" class="bg-gray-500 text-white px-4 py-2 rounded">취소</button>
          <button data-action="saveProcess" class="bg-blue-600 text-white px-4 py-2 rounded font-medium">저장</button>
        </div>
      </div>`;
  }

  const byLine = {};
  state.settings.processes.forEach((p,i) => {
    const l = p.line || "(미지정)";
    if (!byLine[l]) byLine[l] = [];
    byLine[l].push({ p, i });
  });

  const groups = Object.keys(byLine).map(line => `
    <div class="mb-4">
      <h4 class="font-bold text-blue-700 mb-2 bg-blue-50 px-3 py-1.5 rounded">🏭 ${line} <span class="text-xs text-gray-500">(${byLine[line].length}개 공정)</span></h4>
      <table class="w-full text-sm border">
        <thead class="bg-gray-100">
          <tr><th class="p-2 text-left w-12">#</th><th class="p-2 text-left">공정명</th><th class="p-2 text-right w-32">작업</th></tr>
        </thead>
        <tbody>
          ${byLine[line].map((item,j)=>`
            <tr class="border-b hover:bg-gray-50">
              <td class="p-2">${j+1}</td>
              <td class="p-2 font-medium">${item.p.name}</td>
              <td class="p-2 text-right">
                <button data-action="editProcess" data-idx="${item.i}" class="text-blue-600 hover:underline mr-2">편집</button>
                <button data-action="delProcess" data-idx="${item.i}" class="text-red-600 hover:underline">삭제</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `).join("");

  return `
    <div class="flex justify-between items-center mb-3">
      <p class="text-sm text-gray-600">라인별로 공정을 관리합니다. 먼저 '라인 관리'에서 라인을 등록하세요.</p>
      <button data-action="addProcess" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">+ 공정 추가</button>
    </div>
    ${groups || '<div class="text-center text-gray-500 py-8 border rounded">등록된 공정이 없습니다.</div>'}`;
}
