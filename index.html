function attachHandlers() {
  document.querySelectorAll("[data-action]").forEach(el => el.addEventListener("click", handleAction));

  // 현재 사용자 선택
  const userSel = document.getElementById("currentUserSelect");
  if (userSel) userSel.addEventListener("change", e => {
    state.currentUser = e.target.value;
    saveCurrentUser(state.currentUser);
    render();
  });

  const lineSel = document.getElementById("lineSelect");
  if (lineSel) lineSel.addEventListener("change", e => {
    state.currentLog.line = e.target.value;
    state.currentLog.processId = null;
    state.currentLog.content = "";
    render();
  });

  const ps = document.getElementById("processSelect");
  if (ps) ps.addEventListener("change", e => {
    const id = parseInt(e.target.value);
    const tpl = findProcess(id);
    if (tpl) {
      if (!state.currentLog.content || confirm("현재 입력된 교육내용을 공정 템플릿으로 덮어쓰시겠습니까?")) {
        state.currentLog.content = tpl.content;
      }
      state.currentLog.processId = id;
      state.currentLog.courseName = tpl.name;
      render();
    } else {
      state.currentLog.processId = null;
    }
  });

  const is = document.getElementById("instructorSelect");
  if (is) is.addEventListener("change", e => {
    const i = state.settings.instructors.find(x=>x.name===e.target.value);
    if (i) {
      state.currentLog.instructorName = i.name;
      state.currentLog.instructorPosition = i.position;
      state.currentLog.instructorDept = i.dept;
      document.getElementById("instructorPosition").value = i.position;
      document.getElementById("instructorDept").value = i.dept;
    }
  });

  document.querySelectorAll(".trainee-cb").forEach(cb => {
    cb.addEventListener("change", e => {
      const name = e.target.value;
      const set = new Set(state.currentLog.trainees || []);
      if (e.target.checked) set.add(name); else set.delete(name);
      state.currentLog.trainees = Array.from(set);
      e.target.closest("label").classList.toggle("bg-blue-100", e.target.checked);
      e.target.closest("label").classList.toggle("border-blue-400", e.target.checked);
    });
  });

  document.querySelectorAll(".score-input").forEach(r => {
    r.addEventListener("change", e => {
      const idx = parseInt(e.target.name.split("_")[1]);
      state.currentLog.scores[idx] = parseInt(e.target.value);
      render();
    });
  });

  document.querySelectorAll(".people-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const k = e.target.dataset.key, i = parseInt(e.target.dataset.idx), f = e.target.dataset.field;
      state.settings[k][i][f] = e.target.value;
      saveSettings(state.settings);
    });
  });

  // 사진 업로드 (자동 리사이즈 + JPEG 압축)
  document.querySelectorAll(".photo-upload").forEach(inp => {
    inp.addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const idx = parseInt(e.target.dataset.idx);
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const size = 120; // 120x120 정사각형
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          // 중앙 크롭
          const minDim = Math.min(img.width, img.height);
          const sx = (img.width - minDim) / 2;
          const sy = (img.height - minDim) / 2;
          ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);
          const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
          state.settings.trainees[idx].photo = dataUrl;
          try {
            saveSettings(state.settings);
            render();
          } catch(err) {
            alert("사진 저장 실패: localStorage 용량 부족. 일부 사진을 삭제하세요.");
          }
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  });
  document.querySelectorAll(".simple-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const k = e.target.dataset.key, i = parseInt(e.target.dataset.idx);
      const oldValue = state.settings[k][i];
      const newValue = e.target.value;
      state.settings[k][i] = newValue;

      // 라인 이름 변경 시 → 그 라인에 속한 모든 공정의 line 필드 동기화
      if (k === "lines" && oldValue !== newValue) {
        let updated = 0;
        state.settings.processes.forEach(p => {
          if (p.line === oldValue) { p.line = newValue; updated++; }
        });
        if (updated > 0) {
          // 교육일지의 line 필드도 동기화
          state.logs.forEach(l => { if (l.line === oldValue) l.line = newValue; });
          saveLogs(state.logs);
        }
      }

      saveSettings(state.settings);
      // 라인 변경 시 화면 다시 그리기 (공정 관리 그룹화 갱신용)
      if (k === "lines") render();
    });
  });

  // 부서 - 공정 체크박스
  document.querySelectorAll(".dept-process-cb").forEach(cb => {
    cb.addEventListener("change", e => {
      const didx = parseInt(e.target.dataset.didx);
      const pid = parseInt(e.target.dataset.pid);
      const dept = state.settings.departments[didx];
      if (!dept.requiredProcessIds) dept.requiredProcessIds = [];
      if (e.target.checked) {
        if (!dept.requiredProcessIds.includes(pid)) dept.requiredProcessIds.push(pid);
      } else {
        dept.requiredProcessIds = dept.requiredProcessIds.filter(x=>x!==pid);
      }
      saveSettings(state.settings);
      render();
    });
  });

  // 부서장 선택
  document.querySelectorAll(".dept-manager-select").forEach(sel => {
    sel.addEventListener("change", e => {
      const didx = parseInt(e.target.dataset.didx);
      state.settings.departments[didx].manager = e.target.value;
      saveSettings(state.settings);
    });
  });

  // 강사 - 부서장 여부 체크박스
  document.querySelectorAll(".instructor-mgr-cb").forEach(cb => {
    cb.addEventListener("change", e => {
      const i = parseInt(e.target.dataset.idx);
      state.settings.instructors[i].isManager = e.target.checked;
      saveSettings(state.settings);
    });
  });

  // 부서명 편집
  document.querySelectorAll(".dept-name-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const i = parseInt(e.target.dataset.idx);
      state.settings.departments[i].name = e.target.value;
      saveSettings(state.settings);
    });
  });

  // 계획 일정 입력 (date input)
  document.querySelectorAll(".plan-date-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const action = e.target.dataset.action;
      const trainee = e.target.dataset.trainee;
      const pid = parseInt(e.target.dataset.pid);
      const date = e.target.value;
      if (!date) return;
      if (action === "addPlan") {
        state.plans.push({ traineeName: trainee, processId: pid, plannedDate: date, status: "planned" });
      } else if (action === "updatePlan" || action === "updatePlanFromSchedule") {
        const plan = state.plans.find(p => p.traineeName===trainee && p.processId===pid);
        if (plan) plan.plannedDate = date;
      }
      savePlans(state.plans);
      render();
    });
  });

  // 스킬맵 라인 필터
  const skLine = document.getElementById("skillLineFilter");
  if (skLine) skLine.addEventListener("change", e => {
    state.skillFilterLine = e.target.value;
    render();
  });

  const imp = document.getElementById("importSettings");
  if (imp) imp.addEventListener("change", e => {
    const f = e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = ev => {
      try { state.settings = JSON.parse(ev.target.result); saveSettings(state.settings); render(); alert("설정 가져오기 완료"); }
      catch(err) { alert("파일 오류"); }
    };
    rd.readAsText(f);
  });

  // 전체 백업 복원
  const impBackup = document.getElementById("importFullBackup");
  if (impBackup) impBackup.addEventListener("change", e => {
    const f = e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = ev => {
      try {
        const backup = JSON.parse(ev.target.result);
        if (!backup.settings && !backup.logs) { alert("유효한 백업 파일이 아닙니다."); return; }
        if (!confirm(`백업 복원 (${backup.exportDate||'날짜 미상'})\n\n현재 데이터가 모두 덮어쓰여집니다. 계속하시겠습니까?`)) return;
        if (backup.settings) { state.settings = backup.settings; localStorage.setItem(SETTINGS_KEY, JSON.stringify(backup.settings)); }
        if (backup.logs) { state.logs = backup.logs; localStorage.setItem(LOGS_KEY, JSON.stringify(backup.logs)); }
        if (backup.plans) { state.plans = backup.plans; localStorage.setItem(PLANS_KEY, JSON.stringify(backup.plans)); }
        syncToGoogle("all"); // 구글에도 업로드
        render();
        alert("✅ 백업 복원 완료!");
      } catch(err) { alert("파일 오류: " + err.message); }
    };
    rd.readAsText(f);
  });
}

function handleAction(e) {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;
  const id = parseInt(btn.dataset.id);
  const idx = parseInt(btn.dataset.idx);
  const key = btn.dataset.key;

  switch(action) {
    case "goList": state.view = "list"; state.logs = loadLogs(); render(); break;
    case "goStats": state.view = "stats"; state.selectedTrainee = null; render(); break;
    case "setStatsDept": state.statsFilterDept = btn.dataset.dept; state.selectedTrainee = null; render(); break;
    case "goSchedule": state.view = "schedule"; render(); break;
    case "setScheduleDept": state.scheduleFilterDept = btn.dataset.dept; render(); break;
    case "goSkill": state.view = "skill"; render(); break;
    case "setSkillDept": state.skillFilterDept = btn.dataset.dept; state.skillFilterLine = ""; render(); break;
    case "goSettings": {
      if (!state.settingsUnlocked) {
        const pwd = prompt("⚙️ 관리자 비밀번호를 입력하세요");
        if (pwd === null) return;
        if (pwd !== ADMIN_PASSWORD) { alert("비밀번호가 일치하지 않습니다."); return; }
        state.settingsUnlocked = true;
      }
      state.view = "settings"; state.editingProcessIdx = -1; render(); break;
    }
    case "lockSettings": {
      state.settingsUnlocked = false;
      state.view = "stats"; render();
      break;
    }
    case "openSkillLog": {
      const lid = parseInt(btn.dataset.logid);
      const log = state.logs.find(l=>l.id===lid);
      if (log) {
        state.currentLog = log;
        if (typeof state.currentLog.trainees === "string") state.currentLog.trainees = state.currentLog.trainees.split(",").map(s=>s.trim()).filter(Boolean);
        state.view = "print"; render();
      }
      break;
    }
    case "exportSkill": exportSkillCSV(); break;
    case "selectTrainee": state.selectedTrainee = btn.dataset.name; render(); break;
    case "selectTraineeFromSchedule":
      state.view = "stats";
      state.selectedTrainee = btn.dataset.name;
      render();
      break;
    case "clearTrainee": state.selectedTrainee = null; render(); break;
    case "exportStats": exportStatsCSV(); break;
    case "exportSchedule": exportScheduleCSV(); break;

    case "schFilter":
      state.scheduleFilter = btn.dataset.mode;
      render();
      break;

    case "bulkPlanAll": {
      const currentDept = state.scheduleFilterDept;
      const dateStr = prompt(`${currentDept} 부서 일괄 계획일을 입력하세요 (예: 2026-05-31)`, new Date(Date.now()+30*86400000).toISOString().slice(0,10));
      if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return;
      let added = 0;
      state.settings.trainees.filter(t => t.dept === currentDept).forEach(t => {
        const dept = (state.settings.departments||[]).find(d=>d.name===t.dept);
        if (!dept) return;
        const required = dept.requiredProcessIds||[];
        const planned = new Set(state.plans.filter(p=>p.traineeName===t.name).map(p=>p.processId));
        const done = new Set(state.logs.filter(l=>(l.trainees||[]).includes(t.name)).map(l=>l.processId));
        required.forEach(pid => {
          if (!planned.has(pid) && !done.has(pid)) {
            state.plans.push({ traineeName: t.name, processId: pid, plannedDate: dateStr, status: "planned" });
            added++;
          }
        });
      });
      savePlans(state.plans);
      alert(`${added}건의 ${currentDept} 교육 계획이 등록되었습니다.`);
      render();
      break;
    }

    case "delPlanFromSchedule": {
      const tr = btn.dataset.trainee, pid = parseInt(btn.dataset.pid);
      if (confirm("계획을 삭제하시겠습니까?")) {
        state.plans = state.plans.filter(p => !(p.traineeName===tr && p.processId===pid));
        savePlans(state.plans); render();
      }
      break;
    }

    case "addDept": {
      const name = prompt("부서명:"); if (!name) return;
      if (!state.settings.departments) state.settings.departments = [];
      state.settings.departments.push({ name, requiredProcessIds: [] });
      saveSettings(state.settings); render();
      break;
    }
    case "delDept":
      if (confirm("부서를 삭제하시겠습니까?")) {
        state.settings.departments.splice(idx,1);
        saveSettings(state.settings); render();
      }
      break;

    case "delPlan": {
      const tr = btn.dataset.trainee, pid = parseInt(btn.dataset.pid);
      state.plans = state.plans.filter(p => !(p.traineeName===tr && p.processId===pid));
      savePlans(state.plans); render();
      break;
    }
    case "tab": state.settingsTab = btn.dataset.tab; state.editingProcessIdx = -1; render(); break;

    case "new":
      state.currentLog = newLog();
      state.view = "edit"; render(); break;

    case "startLogFromPlan": {
      const traineeName = btn.dataset.trainee;
      const pid = parseInt(btn.dataset.pid);
      const proc = findProcess(pid);
      if (!proc) { alert("공정을 찾을 수 없습니다."); return; }

      // 새 일지 생성 + 계획 정보 자동 채우기
      const log = newLog();
      log.processId = pid;
      log.courseName = proc.name;
      log.line = proc.line;
      log.content = proc.content || "";
      log.trainees = [traineeName];

      // 강사: 해당 부서 첫 번째 강사 자동 선택
      const trainee = state.settings.trainees.find(t => t.name === traineeName);
      if (trainee) {
        const inst = state.settings.instructors.find(i => i.dept === trainee.dept);
        if (inst) {
          log.instructorName = inst.name;
          log.instructorPosition = inst.position;
          log.instructorDept = inst.dept;
        }
      }

      // 계획일이 있으면 그 날짜를 시작/종료일에 채움
      const plan = state.plans.find(p => p.traineeName === traineeName && p.processId === pid);
      if (plan && plan.plannedDate) {
        log.startDate = plan.plannedDate;
        log.endDate = plan.plannedDate;
      }

      state.currentLog = log;
      state.view = "edit"; render();
      break;
    }

    case "edit":
      state.currentLog = JSON.parse(JSON.stringify(state.logs.find(l=>l.id===id)));
      if (typeof state.currentLog.trainees === "string") state.currentLog.trainees = state.currentLog.trainees.split(",").map(s=>s.trim()).filter(Boolean);
      state.view = "edit"; render(); break;
    case "print":
      state.currentLog = state.logs.find(l=>l.id===id);
      if (typeof state.currentLog.trainees === "string") state.currentLog.trainees = state.currentLog.trainees.split(",").map(s=>s.trim()).filter(Boolean);
      state.view = "print"; render(); break;
    case "delete":
      if (confirm("삭제하시겠습니까?")) { state.logs = state.logs.filter(l=>l.id!==id); saveLogs(state.logs); render(); }
      break;

    case "save": {
      const log = state.currentLog;
      ["startDate","endDate","evalMethod","content","instructorEval","opinion"].forEach(f => {
        const el = document.getElementById(f); if (el) log[f] = el.value;
      });
      log.hours = parseFloat(document.getElementById("hours").value) || 0;
      log.line = document.getElementById("lineSelect").value;
      const pid = document.getElementById("processSelect").value;
      log.processId = pid ? parseInt(pid) : null;
      log.instructorName = document.getElementById("instructorSelect").value || log.instructorName;
      const tpl = findProcess(log.processId);
      if (tpl) log.courseName = tpl.name;

      // 부서장 선택
      const mgrEl = document.getElementById("managerSelect");
      const managerName = mgrEl ? mgrEl.value : "";

      // 결재 라인 (담당자 = 강사 자동, 부서장 선택)
      if (!log.approvers) log.approvers = { instructor:{name:"",approved:false,approvedAt:""}, manager:{name:"",approved:false,approvedAt:""} };
      if (log.approvers.instructor.name !== log.instructorName) {
        log.approvers.instructor = { name: log.instructorName, approved: false, approvedAt: "" };
      }
      if (log.approvers.manager.name !== managerName) {
        log.approvers.manager = { name: managerName, approved: false, approvedAt: "" };
      }

      const i = state.logs.findIndex(l=>l.id===log.id);
      if (i>=0) state.logs[i] = log; else state.logs.push(log);
      saveLogs(state.logs);
      alert("저장되었습니다. 결재함에서 승인을 진행하세요.");
      state.view = "list"; render();
      break;
    }

    case "approveStep": {
      const log = state.logs.find(l=>l.id===id);
      if (!log || !log.approvers) return;
      const step = btn.dataset.step;
      const approverName = step === "instructor" ? log.approvers.instructor.name : log.approvers.manager.name;

      // 비밀번호 확인
      const inst = state.settings.instructors.find(i => i.name === approverName);
      if (!inst) { alert(`${approverName} 님이 강사 마스터에 등록되어 있지 않습니다.\n설정 → 강사 관리에서 등록하고 비밀번호를 설정하세요.`); return; }
      if (!inst.password) { alert(`${approverName} 님의 비밀번호가 설정되지 않았습니다.\n설정 → 강사 관리에서 비밀번호를 입력하세요.`); return; }

      const pwd = prompt(`${approverName} 님의 결재 비밀번호를 입력하세요`);
      if (pwd === null) return;
      if (pwd !== inst.password) { alert("비밀번호가 일치하지 않습니다."); return; }

      const now = new Date().toISOString();
      if (step === "instructor" && !log.approvers.instructor.approved) {
        log.approvers.instructor.approved = true;
        log.approvers.instructor.approvedAt = now;
      } else if (step === "manager" && !log.approvers.manager.approved && log.approvers.instructor.approved) {
        log.approvers.manager.approved = true;
        log.approvers.manager.approvedAt = now;
      } else {
        alert("승인할 수 없는 단계입니다.");
        return;
      }
      saveLogs(state.logs);
      render();
      break;
    }

    case "goApprovals": state.view = "approvals"; render(); break;
    case "manualSync": {
      syncFromGoogle().then(updated => {
        if (updated) { render(); alert("구글에서 최신 데이터를 불러왔습니다."); }
        else if (!syncStatus.error) alert("변경 없음");
        else alert("동기화 오류: " + syncStatus.error);
      });
      break;
    }

    case "export": exportCSV(); break;

    case "addProcess":
      if (state.settings.lines.length === 0) { alert("먼저 '라인 관리'에서 라인을 등록하세요."); return; }
      state.editingProcessIdx = state.settings.processes.length; render(); break;
    case "editProcess":
      state.editingProcessIdx = idx; render(); break;
    case "cancelProcess":
      state.editingProcessIdx = -1; render(); break;
    case "saveProcess": {
      const existing = state.editingProcessIdx < state.settings.processes.length ? state.settings.processes[state.editingProcessIdx] : null;
      const p = {
        id: existing ? existing.id : nextProcessId(),
        line: document.getElementById("p_line").value,
        name: document.getElementById("p_name").value.trim(),
        content: document.getElementById("p_content").value
      };
      if (!p.name) { alert("공정명은 필수입니다."); return; }
      if (existing) state.settings.processes[state.editingProcessIdx] = p;
      else state.settings.processes.push(p);
      saveSettings(state.settings);
      state.editingProcessIdx = -1; render();
      break;
    }
    case "delProcess": {
      const proc = state.settings.processes[idx];
      if (!proc) break;
      // 영향 분석
      const affectedDepts = (state.settings.departments||[]).filter(d => (d.requiredProcessIds||[]).includes(proc.id));
      const affectedLogs = state.logs.filter(l => l.processId === proc.id);
      const affectedPlans = state.plans.filter(p => p.processId === proc.id);
      let msg = `'${proc.name}' 공정을 삭제하시겠습니까?`;
      if (affectedDepts.length || affectedLogs.length || affectedPlans.length) {
        msg += "\n\n다음 항목에 영향이 있습니다:";
        if (affectedDepts.length) msg += `\n· ${affectedDepts.length}개 부서의 필수 교육 목록에서 제거됨`;
        if (affectedLogs.length) msg += `\n· ${affectedLogs.length}건의 교육일지가 공정 정보를 잃음 (일지는 유지)`;
        if (affectedPlans.length) msg += `\n· ${affectedPlans.length}건의 교육 계획이 함께 삭제됨`;
      }
      if (!confirm(msg)) return;

      state.settings.processes.splice(idx,1);
      // 부서 필수 목록에서 제거
      (state.settings.departments||[]).forEach(d => {
        if (d.requiredProcessIds) d.requiredProcessIds = d.requiredProcessIds.filter(id => id !== proc.id);
      });
      // 계획에서도 제거
      state.plans = state.plans.filter(p => p.processId !== proc.id);
      savePlans(state.plans);
      saveSettings(state.settings); render();
      break;
    }

    case "addPerson": {
      const name = prompt("이름:"); if (!name) return;
      const obj = key==="instructors" ? {name, position:"리더", dept:"TCP"} : {name, dept:"TCP", joinDate:"", photo:""};
      state.settings[key].push(obj); saveSettings(state.settings); render();
      break;
    }
    case "removePhoto": {
      state.settings.trainees[idx].photo = "";
      saveSettings(state.settings); render();
      break;
    }
    case "delPerson": {
      const person = state.settings[key][idx];
      if (!person) break;
      let msg = `'${person.name}' 님을 삭제하시겠습니까?`;
      if (key === "trainees") {
        const inLogs = state.logs.filter(l => (l.trainees||[]).includes(person.name)).length;
        const inPlans = state.plans.filter(p => p.traineeName === person.name).length;
        if (inLogs || inPlans) {
          msg += "\n\n주의: 다음 데이터에 영향이 있습니다:";
          if (inLogs) msg += `\n· ${inLogs}건의 교육일지에 이름이 남아있음 (일지는 유지)`;
          if (inPlans) msg += `\n· ${inPlans}건의 교육 계획이 함께 삭제됨`;
        }
      }
      if (!confirm(msg)) return;
      state.settings[key].splice(idx,1);
      if (key === "trainees") {
        // 계획에서 제거
        state.plans = state.plans.filter(p => p.traineeName !== person.name);
        savePlans(state.plans);
      }
      saveSettings(state.settings); render();
      break;
    }

    case "addSimple": {
      const v = prompt("추가할 항목:"); if (!v) return;
      state.settings[key].push(v); saveSettings(state.settings); render();
      break;
    }
    case "delSimple": {
      // 라인 삭제 시 → 그 라인의 공정도 함께 처리
      if (key === "lines") {
        const lineName = state.settings.lines[idx];
        const linkedProcesses = state.settings.processes.filter(p => p.line === lineName);
        if (linkedProcesses.length > 0) {
          if (!confirm(`'${lineName}' 라인에 ${linkedProcesses.length}개 공정이 등록되어 있습니다.\n\n[확인]을 누르면 라인과 함께 그 공정들도 모두 삭제됩니다.\n[취소]를 누르면 아무것도 삭제되지 않습니다.`)) return;
          // 공정 ID 수집 후 부서 필수 목록에서도 제거
          const removedIds = linkedProcesses.map(p=>p.id);
          state.settings.processes = state.settings.processes.filter(p => p.line !== lineName);
          (state.settings.departments||[]).forEach(d => {
            if (d.requiredProcessIds) d.requiredProcessIds = d.requiredProcessIds.filter(id => !removedIds.includes(id));
          });
        } else {
          if (!confirm(`'${lineName}' 라인을 삭제하시겠습니까?`)) return;
        }
        state.settings.lines.splice(idx,1);
        saveSettings(state.settings); render();
      } else {
        if (confirm("삭제하시겠습니까?")) { state.settings[key].splice(idx,1); saveSettings(state.settings); render(); }
      }
      break;
    }

    case "exportSettings": {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([JSON.stringify(state.settings,null,2)], {type:"application/json"}));
      a.download = `교육일지_설정_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); break;
    }
    case "resetSettings":
      if (confirm("설정을 초기값으로 되돌리시겠습니까?")) {
        state.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
        saveSettings(state.settings); render();
      } break;

    case "saveGoogleUrl": {
      const urlEl = document.getElementById("googleSyncUrl");
      if (urlEl) {
        const newUrl = urlEl.value.trim();
        setSyncUrl(newUrl);
        if (newUrl) alert("Google 동기화 URL이 저장되었습니다.\n'연결 테스트' 버튼으로 확인하세요.");
        render();
      }
      break;
    }
    case "testGoogleSync": {
      syncFromGoogle().then(ok => {
        if (syncStatus.error) alert("❌ 연결 실패: " + syncStatus.error);
        else alert("✅ 연결 성공!\n마지막 동기화: " + syncStatus.last);
      });
      break;
    }
    case "uploadAllToGoogle": {
      if (confirm("현재 로컬 데이터를 구글에 전체 업로드합니다.\n구글 데이터가 덮어쓰여집니다. 계속하시겠습니까?")) {
        syncToGoogle("all").then(() => {
          if (syncStatus.error) alert("❌ 업로드 실패: " + syncStatus.error);
          else alert("✅ 전체 업로드 완료!");
          render();
        });
      }
      break;
    }
    case "downloadAllFromGoogle": {
      if (confirm("구글 데이터를 다운로드하여 로컬을 덮어씁니다.\n현재 로컬 데이터가 바뀔 수 있습니다. 계속하시겠습니까?")) {
        syncFromGoogle().then(updated => {
          if (updated) { render(); alert("✅ 전체 다운로드 완료!"); }
          else if (syncStatus.error) alert("❌ 다운로드 실패: " + syncStatus.error);
          else alert("구글에 저장된 데이터가 없습니다.");
        });
      }
      break;
    }
    case "disconnectGoogle": {
      if (confirm("Google 동기화를 해제하시겠습니까?\n로컬 데이터는 유지됩니다.")) {
        setSyncUrl("");
        render();
      }
      break;
    }
    case "exportFullBackup": {
      const backup = {
        version: "v4",
        exportDate: new Date().toISOString(),
        settings: state.settings,
        logs: state.logs,
        plans: state.plans
      };
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([JSON.stringify(backup, null, 2)], {type:"application/json"}));
      a.download = `TCP_교육일지_전체백업_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      break;
    }
  }
}

function exportSkillCSV() {
  const trainees = state.settings.trainees;
  const processes = state.settings.processes;
  if (trainees.length === 0 || processes.length === 0) { alert("내보낼 데이터가 없습니다."); return; }
  // 행 = 공정, 열 = 인원
  const headers = ["라인","공정", ...trainees.map(t=>`${t.name}(${t.dept||'-'})`), "이수율(%)"];
  const rows = processes.map(p => {
    const cells = trainees.map(t => getSkillLevel(t.name, p.id).level);
    const trained = cells.filter(l=>l>0).length;
    const cov = ((trained/trainees.length)*100).toFixed(0);
    return [p.line, p.name, ...cells, cov].map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(",");
  });
  // 푸터: 인원별 평균
  const footer = ["", "개인 평균 Lv"];
  trainees.forEach(t => {
    let sum=0, count=0;
    processes.forEach(p => { const lv = getSkillLevel(t.name, p.id).level; if (lv>0) { sum+=lv; count++; } });
    footer.push(count ? (sum/count).toFixed(2) : "0");
  });
  footer.push("");
  const csv = "\uFEFF" + [headers.join(","), ...rows, footer.map(v=>`"${v}"`).join(",")].join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
  a.download = `스킬맵_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function exportScheduleCSV() {
  const today = new Date().toISOString().slice(0,10);
  const rows = [];
  state.plans.forEach(plan => {
    const trainee = state.settings.trainees.find(t=>t.name===plan.traineeName);
    const proc = findProcess(plan.processId);
    const completedLog = state.logs.find(l => l.processId===plan.processId && (l.trainees||[]).includes(plan.traineeName));
    const status = completedLog ? "완료" : (plan.plannedDate < today ? "기한초과" : "예정");
    rows.push([plan.traineeName, trainee?trainee.dept:"", proc?proc.line:"-", proc?proc.name:"-", plan.plannedDate, status,
      completedLog?completedLog.startDate:"", completedLog?(completedLog.scores.reduce((a,b)=>a+b,0)/5).toFixed(2):""]
      .map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(","));
  });
  if (rows.length === 0) { alert("내보낼 계획이 없습니다."); return; }
  const headers = ["피교육자","부서","라인","공정","계획일","상태","교육일","평균점수"];
  const csv = "\uFEFF" + [headers.join(","), ...rows].join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
  a.download = `교육일정_${today}.csv`;
  a.click();
}

function exportStatsCSV() {
  const headers = ["피교육자","부서","라인","교육과정","강사","시작일","종료일","시간(Hr)","평균점수","점수1","점수2","점수3","점수4","점수5"];
  const rows = [];
  state.logs.forEach(log => {
    const tpl = findProcess(log.processId);
    const course = tpl ? tpl.name : (log.courseName||"");
    const avg = (log.scores.reduce((a,b)=>a+b,0)/5).toFixed(2);
    (log.trainees||[]).forEach(name => {
      const p = state.settings.trainees.find(t=>t.name===name);
      rows.push([name, p?p.dept:"", log.line, course, log.instructorName, log.startDate, log.endDate, log.hours, avg, ...log.scores]
        .map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(","));
    });
  });
  if (rows.length === 0) { alert("내보낼 데이터가 없습니다."); return; }
  const csv = "\uFEFF" + [headers.join(","), ...rows].join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
  a.download = `인원별교육현황_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function exportCSV() {
  if (state.logs.length === 0) { alert("내보낼 데이터가 없습니다."); return; }
  const headers = ["ID","라인(장소)","공정","강사","직위","부서","시작일","종료일","시간(Hr)","피교육자","인원수","평가방법","평균점수","점수1","점수2","점수3","점수4","점수5","교육자평가","의견"];
  const rows = state.logs.map(l => {
    const tpl = findProcess(l.processId);
    const avg = (l.scores.reduce((a,b)=>a+b,0)/5).toFixed(2);
    const trainees = Array.isArray(l.trainees) ? l.trainees.join(", ") : "";
    const count = Array.isArray(l.trainees) ? l.trainees.length : 0;
    return [l.id, l.line, tpl?tpl.name:l.courseName, l.instructorName, l.instructorPosition, l.instructorDept,
      l.startDate, l.endDate, l.hours, trainees, count, l.evalMethod, avg,
      ...l.scores, l.instructorEval, l.opinion].map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(",");
  });
  const csv = "\uFEFF" + [headers.join(","), ...rows].join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
  a.download = `교육일지_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// 앱 시작: 구글에서 자동 불러오기 → 렌더링
(async function startup() {
  render(); // 로컬 데이터로 즉시 표시
  if (getSyncUrl()) {
    const updated = await syncFromGoogle();
    if (updated) {
      render(); // 구글 데이터로 갱신
    } else if (!syncStatus.error) {
      // 구글이 비어있고 로컬에 데이터가 있으면 → 첫 업로드
      if (state.settings && state.settings.lines && state.settings.lines.length > 0) {
        syncToGoogle("all");
      }
    }
  }
})();
</script>
